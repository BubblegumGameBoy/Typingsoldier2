<script>
// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
let _ac = null;
let _seGain = null;
function getAC() {
  if (!_ac) {
    try {
      _ac = new (window.AudioContext || window.webkitAudioContext)();
      _seGain = _ac.createGain();
      _seGain.gain.value = audioSettings.seOn ? audioSettings.seVol * SE_BOOST : 0;
      _seGain.connect(_ac.destination);
    } catch(e){}
  }
  return _ac;
}
function seOut() { getAC(); return _seGain || _ac.destination; }

// 効果音を増幅・BGMを減衰する係数（スライダー値に掛ける）
const SE_BOOST = 2.2;
const BGM_SCALE = 0.5;

// ── 音声設定（localStorage 永続化） ──
const audioSettings = (() => {
  const def = { bgmOn: true, seOn: true, bgmVol: 0.5, seVol: 0.7 };
  try {
    const s = JSON.parse(localStorage.getItem('soldiertypingAudio') || '{}');
    return Object.assign(def, s);
  } catch { return def; }
})();
function saveAudioSettings() {
  try { localStorage.setItem('soldiertypingAudio', JSON.stringify(audioSettings)); } catch {}
}
function applySeSettings() {
  if (_seGain) _seGain.gain.value = audioSettings.seOn ? audioSettings.seVol * SE_BOOST : 0;
}

// ═══════════════════════════════════════════════
// BGM マネージャ（フェードイン／アウト付き）
// ═══════════════════════════════════════════════
const BGM_FILES = {
  wave1:  'audio/wave1.mp3',
  normal: 'audio/Wave2-4 - Normal song.mp3',
  boss2:  'audio/Wave2 - BOSS FIGHT.mp3',
  boss3:  'audio/Wave3 - Boss fight.mp3',
  boss5:  'audio/Wave5 -Boss fight.mp3',
  demon:  'audio/Wave3 - Boss fight.mp3',
  hero:   'audio/Wave4 - 勇者誕生.mp3',
};
const _bgmEls = {};
function _getBgmEl(key) {
  if (!_bgmEls[key]) {
    const el = new Audio(encodeURI(BGM_FILES[key]));
    el.preload = 'auto';
    el.loop = true;
    el.volume = 0;
    _bgmEls[key] = el;
  }
  return _bgmEls[key];
}
let _bgmCurrent = null;       // 現在再生中のキー
let _bgmFadeTimers = {};
function _fade(el, from, to, ms, after) {
  const key = el.src;
  if (_bgmFadeTimers[key]) clearInterval(_bgmFadeTimers[key]);
  const steps = Math.max(1, Math.round(ms / 50));
  let i = 0;
  el.volume = Math.max(0, Math.min(1, from));
  _bgmFadeTimers[key] = setInterval(() => {
    i++;
    const t = i / steps;
    el.volume = Math.max(0, Math.min(1, from + (to - from) * t));
    if (i >= steps) {
      clearInterval(_bgmFadeTimers[key]);
      _bgmFadeTimers[key] = null;
      if (after) after();
    }
  }, 50);
}
// key を再生。fadeMs でクロスフェード。loop=false なら再生終了時 onEnd を呼ぶ
function playBGM(key, opts = {}) {
  const { fadeMs = 2000, loop = true, onEnd = null, restart = true } = opts;
  if (!audioSettings.bgmOn) { _bgmCurrent = key; return; }
  const target = audioSettings.bgmVol * BGM_SCALE;
  // 現在の曲をフェードアウト＆停止
  const prevKey = _bgmCurrent;
  if (prevKey && prevKey !== key) {
    const prev = _getBgmEl(prevKey);
    _fade(prev, prev.volume, 0, fadeMs, () => { try { prev.pause(); } catch{} });
  }
  _bgmCurrent = key;
  const el = _getBgmEl(key);
  el.loop = loop;
  el.onended = null;
  if (!loop && onEnd) {
    el.onended = () => { onEnd(); };
  }
  if (restart || el.paused) { try { el.currentTime = 0; } catch{} }
  const p = el.play();
  if (p && p.catch) p.catch(()=>{});
  _fade(el, prevKey === key ? el.volume : 0, target, fadeMs);
}
function stopBGM(fadeMs = 1500) {
  if (!_bgmCurrent) return;
  const el = _getBgmEl(_bgmCurrent);
  _fade(el, el.volume, 0, fadeMs, () => { try { el.pause(); } catch{} });
  _bgmCurrent = null;
}
function applyBgmVolume() {
  if (_bgmCurrent && audioSettings.bgmOn) {
    const el = _getBgmEl(_bgmCurrent);
    el.volume = audioSettings.bgmVol * BGM_SCALE;
  }
}
function setBgmEnabled(on) {
  audioSettings.bgmOn = on;
  if (!on) {
    Object.values(_bgmEls).forEach(el => { try { el.pause(); } catch{} });
  } else if (_bgmCurrent) {
    const key = _bgmCurrent;
    _bgmCurrent = null;
    playBGM(key, { fadeMs: 800, restart: false });
  }
  saveAudioSettings();
}

// ── 設定パネル UI 制御 ──
function toggleAudioPanel() {
  const p = document.getElementById('audioPanel');
  const open = p.style.display === 'none' || !p.style.display;
  p.style.display = open ? 'block' : 'none';
  if (open) syncAudioPanel();
}
function syncAudioPanel() {
  const bt = document.getElementById('bgmToggle');
  const st = document.getElementById('seToggle');
  const bv = document.getElementById('bgmVolSlider');
  const sv = document.getElementById('seVolSlider');
  if (bt) bt.checked = audioSettings.bgmOn;
  if (st) st.checked = audioSettings.seOn;
  if (bv) bv.value = Math.round(audioSettings.bgmVol * 100);
  if (sv) sv.value = Math.round(audioSettings.seVol * 100);
}
function onBgmToggle(on) { setBgmEnabled(on); }
function onSeToggle(on) {
  audioSettings.seOn = on;
  applySeSettings();
  saveAudioSettings();
  if (on) tone(880, 0.08, 'sine', 0.06); // テスト音
}
function onBgmVol(v) {
  audioSettings.bgmVol = v / 100;
  applyBgmVolume();
  saveAudioSettings();
}
function onSeVol(v) {
  audioSettings.seVol = v / 100;
  applySeSettings();
  saveAudioSettings();
}
function tone(freq, dur, type='sine', vol=0.07, freqEnd=null) {
  const a = getAC(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.connect(g); g.connect(seOut());
  o.type = type; o.frequency.value = freq;
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, a.currentTime + dur * 0.8);
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  o.start(a.currentTime); o.stop(a.currentTime + dur);
}
function playKey()   { tone(750 + Math.random()*150, 0.07, 'sine', 0.06, 1050 + Math.random()*200); }
function playWord()  {
  const a = getAC(); if (!a) return;
  [523,659,784,1047].forEach((f,i) => {
    const o=a.createOscillator(),g=a.createGain(); o.connect(g); g.connect(seOut());
    o.type='sine'; o.frequency.value=f;
    const t=a.currentTime+i*0.06;
    g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
    o.start(t); o.stop(t+0.28);
  });
}
function playWrong() { tone(220, 0.08, 'square', 0.04, 160); }
function playWave()  {
  const a = getAC(); if (!a) return;
  [392,494,587].forEach((f,i) => {
    const o=a.createOscillator(),g=a.createGain(); o.connect(g); g.connect(seOut());
    o.type='sawtooth'; o.frequency.value=f;
    const t=a.currentTime+i*0.1;
    g.gain.setValueAtTime(0.06,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.start(t); o.stop(t+0.25);
  });
}
function playHeroFanfare() {
  const a = getAC(); if (!a) return;
  // ファンファーレ: 勇者登場テーマ (約2.5秒)
  const notes = [
    [523,0.00],[659,0.15],[784,0.30],[1047,0.45], // 上昇アルペジオ
    [880,0.70],[988,0.85],[1047,1.00],[1175,1.20], // 2段目
    [1319,1.45],[1175,1.65],[1047,1.85],[784,2.00], // クライマックス下降
    [523,2.20],[659,2.35],[784,2.55],               // 締め
  ];
  notes.forEach(([freq, delay]) => {
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g); g.connect(seOut());
    o.type='square'; o.frequency.value=freq;
    const t=a.currentTime+delay;
    g.gain.setValueAtTime(0.09,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.start(t); o.stop(t+0.2);
  });
  // 和音ベース
  [[131,0.00],[165,0.70],[196,1.45],[131,2.20]].forEach(([freq,delay]) => {
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g); g.connect(seOut());
    o.type='sine'; o.frequency.value=freq;
    const t=a.currentTime+delay;
    g.gain.setValueAtTime(0.07,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
    o.start(t); o.stop(t+0.5);
  });
  // ドラムロール（着地衝撃）
  [0.00,0.03,0.06,0.09,0.12,0.80,0.83,0.86,1.45,1.48].forEach(delay => {
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g); g.connect(seOut());
    o.type='sawtooth'; o.frequency.value=80;
    const t=a.currentTime+delay;
    g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    o.start(t); o.stop(t+0.06);
  });
}
function playBossSpawn() {
  const a = getAC(); if (!a) return;
  [220,196,165,147].forEach((f,i) => {
    const o=a.createOscillator(),g=a.createGain(); o.connect(g); g.connect(seOut());
    o.type='sawtooth'; o.frequency.value=f;
    const t=a.currentTime+i*0.12;
    g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    o.start(t); o.stop(t+0.35);
  });
}
function playDemonBirth() {
  const a = getAC(); if (!a) return;
  // 地響き（上昇する重低音スイープ）
  const o1 = a.createOscillator(), g1 = a.createGain();
  o1.connect(g1); g1.connect(seOut());
  o1.type = 'sawtooth';
  o1.frequency.setValueAtTime(35, a.currentTime);
  o1.frequency.exponentialRampToValueAtTime(110, a.currentTime + 1.4);
  g1.gain.setValueAtTime(0.0001, a.currentTime);
  g1.gain.exponentialRampToValueAtTime(0.18, a.currentTime + 0.6);
  g1.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + 1.8);
  o1.start(a.currentTime); o1.stop(a.currentTime + 1.9);
  // 不気味な金属的ヒット
  [[110,0.0],[146,0.45],[110,0.9],[73,1.35]].forEach(([f,d]) => {
    const o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(seOut());
    o.type='square'; o.frequency.value=f;
    const t=a.currentTime+d;
    g.gain.setValueAtTime(0.09,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o.start(t); o.stop(t+0.45);
  });
  // 爆誕インパクト
  const o2=a.createOscillator(), g2=a.createGain();
  o2.connect(g2); g2.connect(seOut());
  o2.type='sawtooth'; o2.frequency.setValueAtTime(180, a.currentTime+1.3);
  o2.frequency.exponentialRampToValueAtTime(40, a.currentTime+1.7);
  g2.gain.setValueAtTime(0.2, a.currentTime+1.3);
  g2.gain.exponentialRampToValueAtTime(0.001, a.currentTime+1.8);
  o2.start(a.currentTime+1.3); o2.stop(a.currentTime+1.85);
}
function playBossDie() {
  const a = getAC(); if (!a) return;
  [330,392,494,659,880].forEach((f,i) => {
    const o=a.createOscillator(),g=a.createGain(); o.connect(g); g.connect(seOut());
    o.type='sine'; o.frequency.value=f;
    const t=a.currentTime+i*0.09;
    g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    o.start(t); o.stop(t+0.35);
  });
}

// かなを単位ごとの「許容ローマ字配列」リストに分解（っ＝促音・小書きyouon対応）
function kanaUnits(kana) {
  const raw = [];
  let i = 0;
  while (i < kana.length) {
    const two = kana.substr(i, 2);
    if (KANA_ROMA[two]) { raw.push(two); i += 2; }
    else { raw.push(kana[i]); i += 1; }
  }
  const out = [];
  let dbl = false;
  for (const u of raw) {
    if (u === 'っ') { dbl = true; continue; }
    let vars = (KANA_ROMA[u] || [u]).slice();
    if (dbl) {
      vars = vars.map(v => {
        const c = v[0];
        return (/[a-z]/.test(c) && !'aiueo'.includes(c)) ? c + v : v;
      });
      dbl = false;
    }
    out.push(vars);
  }
  return out;
}
// 入力がunitsの有効な接頭辞か判定: 'complete' | 'partial' | 'no'
function kanaMatch(units, input) {
  function rec(ui, si) {
    if (si === input.length) return ui === units.length ? 'complete' : 'partial';
    if (ui === units.length) return 'no';
    let res = 'no';
    for (const v of units[ui]) {
      if (v && input.startsWith(v, si)) {
        const r = rec(ui + 1, si + v.length);
        if (r === 'complete') return 'complete';
        if (r === 'partial') res = 'partial';
      } else if (v.startsWith(input.slice(si))) {
        res = 'partial';
      }
    }
    return res;
  }
  return rec(0, 0);
}
// 残り表示用ローマ字を構築（入力に沿った綴りで残りを返す）
function kanaDisplay(units, input) {
  function rec(ui, si) {
    if (si === input.length) {
      let rem = '';
      for (let k = ui; k < units.length; k++) rem += units[k][0];
      return rem;
    }
    if (ui === units.length) return null;
    for (const v of units[ui]) {
      if (v && input.startsWith(v, si)) {
        const r = rec(ui + 1, si + v.length);
        if (r !== null) return r;
      }
    }
    const part = input.slice(si);
    for (const v of units[ui]) {
      if (v.startsWith(part)) {
        let rem = v.slice(part.length);
        for (let k = ui + 1; k < units.length; k++) rem += units[k][0];
        return rem;
      }
    }
    return null;
  }
  const rem = rec(0, 0);
  return rem === null ? '' : rem;
}

const S = 3;
function drawSprite(ctx, pixels, ox, oy, flipX=false) {
  const rows=pixels.length, cols=pixels[0].length;
  ctx.save();
  ctx.translate(ox, oy);
  if (flipX) { ctx.translate(cols*S, 0); ctx.scale(-1,1); }
  for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++) {
      const col=pixels[r][c];
      if (col) { ctx.fillStyle=col; ctx.fillRect(c*S,r*S,S,S); }
    }
  ctx.restore();
}

  allydemon: {frames:['images/demonlord_1.png'],                      drawH:160, yOff:25},
  god:       {frames:['images/god_1.png'],                            drawH:180, yOff:30},
};
const loadedImages = {};
let imagesReady = false;
function preloadImages(done) {
  const paths = [...new Set(Object.values(IMAGE_DEFS).flatMap(d => [...d.frames, ...(d.hit ? [d.hit] : [])]))];
  let count = 0;
  const total = paths.length;
  paths.forEach(p => {
    const img = new Image();
    img.onload = img.onerror = () => { if (++count >= total) { imagesReady = true; if (done) done(); } };
    img.src = p;
    loadedImages[p] = img;
  });
  if (!total) { imagesReady = true; if (done) done(); }
}
function drawImageUnit(u, img, drawH, yOff) {
  if (!img || !img.complete || !img.naturalWidth) return false;
  const aspect = img.naturalWidth / img.naturalHeight;
  const drawW = Math.round(drawH * aspect);
  const off = yOff || 0;
  let groundY = u.risingY !== undefined ? u.risingY : (u.landingY !== undefined ? u.landingY : GROUND);
  // 神：ふわふわ浮遊（上下バウンド）で生きている感じを出す
  if (u.type === 'god' && u.risingY === undefined) {
    groundY -= 10 + 8 * Math.sin(Date.now() / 600);
  }
  // 魔王：空中に浮遊（飛行ビジュアル）。神より低めで重々しく揺れる
  if ((u.type === 'demonlord' || u.type === 'allydemon') && u.risingY === undefined) {
    groundY -= 14 + 7 * Math.sin(Date.now() / 560);
  }
  // 猫・蝙蝠ボス：空を飛ぶ浮遊モンスター（ふわふわ大きく揺れる）
  if ((u.type === 'cat' || u.type === 'bat' || u.type === 'allycat' || u.type === 'allybat') && u.risingY === undefined) {
    groundY -= 28 + 12 * Math.sin(Date.now() / 480);
  }
  const cx = Math.round(u.x - drawW/2);
  const cy = groundY - drawH + off;
  ctx.save();
  if (u.risingY !== undefined) { ctx.beginPath(); ctx.rect(0,0,CW,GROUND); ctx.clip(); }
  if (u.side === 'enemy') {
    ctx.translate(u.x, groundY + off); ctx.scale(-1,1);
    ctx.drawImage(img, -drawW/2, -drawH, drawW, drawH);
  } else {
    ctx.drawImage(img, cx, cy, drawW, drawH);
  }
  ctx.restore();
  if (u.hp < u.maxHp) {
    const pct = Math.max(0, u.hp/u.maxHp);
    ctx.fillStyle='#0008'; ctx.fillRect(cx-1,cy-8,drawW+2,5);
    ctx.fillStyle=pct>0.5?'#4dff6e':pct>0.25?'#ffcc00':'#ff4136';
    ctx.fillRect(cx,cy-7,Math.round(drawW*pct),3);
  }
  if (u.type === 'god' && u.risingY === undefined) {
    const cy2 = groundY - drawH*0.5 + off;
    const pulse = 0.5+0.5*Math.sin(Date.now()/420);
    ctx.save(); ctx.globalAlpha=0.18+0.12*pulse; ctx.globalCompositeOperation='lighter';
    const grad=ctx.createRadialGradient(u.x,cy2,0,u.x,cy2,drawH*0.7);
    grad.addColorStop(0,'#fff7c0'); grad.addColorStop(0.5,'#ffe06688'); grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(u.x,cy2,drawH*0.7,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // 魔王：脈動する暗黒（赤黒）オーラ
  if ((u.type === 'demonlord' || u.type === 'allydemon') && u.risingY === undefined) {
    const cy2 = groundY - drawH*0.45 + off;
    const pulse = 0.5+0.5*Math.sin(Date.now()/380);
    ctx.save(); ctx.globalAlpha=0.16+0.14*pulse; ctx.globalCompositeOperation='lighter';
    const grad=ctx.createRadialGradient(u.x,cy2,0,u.x,cy2,drawH*0.7);
    grad.addColorStop(0,'#ff3300'); grad.addColorStop(0.5,'#88000088'); grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(u.x,cy2,drawH*0.7,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // 猫・蝙蝠：浮遊する魔力オーラ（猫=ピンク／蝙蝠=青）
  if ((u.type === 'cat' || u.type === 'bat' || u.type === 'allycat' || u.type === 'allybat') && u.risingY === undefined) {
    const cy2 = groundY - drawH*0.5 + off;
    const pulse = 0.5+0.5*Math.sin(Date.now()/400);
    const c0 = (u.type==='cat'||u.type==='allycat') ? '#ff66cc' : '#88bbff';
    const c1 = (u.type==='cat'||u.type==='allycat') ? '#aa228888' : '#3366cc88';
    ctx.save(); ctx.globalAlpha=0.14+0.12*pulse; ctx.globalCompositeOperation='lighter';
    const grad=ctx.createRadialGradient(u.x,cy2,0,u.x,cy2,drawH*0.65);
    grad.addColorStop(0,c0); grad.addColorStop(0.5,c1); grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(u.x,cy2,drawH*0.65,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  if (u.isHero && u.landingY !== undefined) {
    const pulse = 0.5+0.5*Math.sin(Date.now()/80);
    ctx.save(); ctx.globalAlpha=0.35*pulse;
    const grad=ctx.createRadialGradient(u.x,groundY,0,u.x,groundY,60);
    grad.addColorStop(0,'#fff7aa'); grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(u.x,groundY,60,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  return true;
}

  if (type==='allybat')   { u.hp=u.maxHp=90;              u.dmg=7;   u.atkRate=900;  u.range=36;  u.speed=0.048; u.spriteW=16; u.spriteH=12; }
  if (type==='goblin')    { u.hp=u.maxHp=Math.round(80*waveMult);  u.dmg=2;  u.atkRate=1300; u.range=32; u.speed=0.038; u.score=10; u.spriteW=10; u.spriteH=14; }
  if (type==='hobgoblin') { u.hp=u.maxHp=Math.round(160*waveMult); u.dmg=6;  u.atkRate=1600; u.range=32; u.speed=0.024; u.score=25; u.spriteW=13; u.spriteH=18; }
  return u;
}

function makeBoss(wave) {
  const d = BOSS_DEFS[wave-1];
  return {
    ...d, id: nextId++, side: 'enemy', isBoss: true,
    x: 650, maxHp: d.hp, state: 'walk',
    target: null, attackTimer: 0, specialTimer: d.type === 'demonlord' ? d.specialRate - 1500 : 0,
    animFrame: 0, animTimer: 0,
    range: d.atkRange,
  };
}

// ═══════════════════════════════════════════════
// SPAWN INTERVALS
// ═══════════════════════════════════════════════
function goblinInterval() {
  const t = gs.waveTime / 1000;
  // 魔王出現中はゴブリンがたまに1匹出る程度
  if (gs.boss && gs.boss.type === 'demonlord') return 18000;
  const bossMult = gs.boss ? 5 : 1;
  if (t < 15)  return 3500 * bossMult;
  if (t < 40)  return 2200 * bossMult;
  if (t < 80)  return 1600 * bossMult;
  return 1200 * bossMult;
}
function hobInterval() {
  if (gs.wave < 2) return Infinity;
  // 魔王出現中はホブゴブリン出現なし
  if (gs.boss && gs.boss.type === 'demonlord') return Infinity;
  const t = gs.waveTime / 1000;
  const bossMult = gs.boss ? 5 : 1;
  if (t < 20)  return 7000 * bossMult;
  if (t < 60)  return 4500 * bossMult;
  return 3000 * bossMult;
}

// ═══════════════════════════════════════════════
// WORD / TYPING
// ═══════════════════════════════════════════════
function pickWord() {
  const pool = WORD_POOLS[Math.min(gs.wave - 1, 4)];
  const recent = gs.recentWords || [];
  const available = pool.filter(w => !recent.includes(w.r));
  const candidates = available.length > 0 ? available : pool;
  const w = candidates[Math.floor(Math.random() * candidates.length)];
  gs.recentWords = [...recent.slice(-5), w.r];
  return w;
}
function nextWord() {
  gs.currentWord = pickWord();
  gs.currentWord.units = kanaUnits(gs.currentWord.k);
  gs.inputValue = '';
  updateWordDisplay();
  const inp = document.getElementById('type-input');
  inp.value = ''; inp.classList.remove('wrong');
}
function updateWordDisplay(val='') {
  if (!gs.currentWord) return;
  const done = val || gs.inputValue;
  document.getElementById('word-kana').textContent = gs.currentWord.k;
  document.getElementById('roma-done').textContent = done;
  document.getElementById('roma-left').textContent = kanaDisplay(gs.currentWord.units, done);
}
function updateWordDisplayError(inputVal) {
  if (!gs.currentWord) return;
  const wrongChar = inputVal.slice(gs.inputValue.length);
  const left = kanaDisplay(gs.currentWord.units, gs.inputValue);
  document.getElementById('word-kana').textContent = gs.currentWord.k;
  document.getElementById('roma-done').textContent = gs.inputValue;
  document.getElementById('roma-left').innerHTML =
    `<span style="color:#ff4136;background:#2a0808;border-bottom:2px solid #ff4136">${wrongChar}</span>` +
    `<span style="color:#445">${left}</span>`;
}
// キーダウンで直接1文字ずつ拾う（IME完全回避）
document.addEventListener('keydown', function(e) {
  // IME変換中は完全無視
  if (e.isComposing) return;

  // Enter: 次Waveへ
  if (e.key === 'Enter' && gs.waitingForEnter) {
    gs.waitingForEnter = false;
    startNextWave();
    return;
  }
  // Escape: ゲーム終了
  if (e.key === 'Escape' && (gs.state === 'playing' || gs.state === 'waveclear')) {
    endGame('lose');
    return;
  }

  if (gs.state !== 'playing') return;

  // Backspace: 1文字削除
  if (e.key === 'Backspace') {
    e.preventDefault();
    processTyping(gs.inputValue.slice(0, -1));
    return;
  }

  // a-z のみ受け付け（スペース・記号・日本語すべて無視）
  if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
    e.preventDefault();
    processTyping(gs.inputValue + e.key.toLowerCase());
  }
});

function processTyping(val) {
  const inp = document.getElementById('type-input');
  if (!gs.currentWord) { gs.inputValue = val; inp.value = val; return; }
  const units = gs.currentWord.units;
  const status = kanaMatch(units, val);
  if (status !== 'no') {
    const prev = gs.inputValue;
    gs.inputValue = val;
    inp.value = val;
    inp.classList.remove('wrong');
    updateWordDisplay(val);
    if (val.length > prev.length) playKey();
    if (status === 'complete') {
      playWord();
      gs.combo = (gs.combo || 0) + 1;
      updateComboDisp();
      gs.effects.push({type:'word', x:CW/2, y:50, timer:700, text:'兵士召喚！', color:'#FFD700'});
      spawnAlly();
      nextWord();
    }
  } else {
    gs.missCount = (gs.missCount || 0) + 1;
    if ((gs.combo || 0) > 0) { gs.combo = 0; updateComboDisp(); }
    const maxLen = gs.inputValue.length + 1;
    if (val.length > maxLen) val = val.slice(0, maxLen);
    inp.value = val;
    if (!inp.classList.contains('wrong')) playWrong();
    inp.classList.add('wrong');
    updateWordDisplayError(val);
  }
}

// コンボ倍率：1コンボごとに+5%（最大2.0倍）
function comboMult() {
  return 1 + Math.min(gs.combo || 0, 20) * 0.05;
}
function updateComboDisp() {
  const el = document.getElementById('comboDisp');
  if (!el) return;
  const c = gs.combo || 0;
  if (c >= 2) {
    el.style.display = 'block';
    el.textContent = `${c} COMBO ×${comboMult().toFixed(2)}`;
  } else {
    el.style.display = 'none';
  }
}

// ═══════════════════════════════════════════════
// SPAWN
// ═══════════════════════════════════════════════
const MAX_ALLY_UNITS = 2000; // 事実上無制限（暴走防止の安全弁のみ）
const SPAWN_GROWTH = 1.18;  // 召喚ごとに次回の召喚数が18%ずつ増え続ける

function currentSpawnBatch() {
  return Math.max(1, Math.floor(gs.spawnPower || 1));
}
function allySlotsLeft() {
  const alive = gs.units.filter(u => u.side === 'ally' && u.state !== 'dead').length;
  return Math.max(0, MAX_ALLY_UNITS - alive);
}

function spawnAlly() {
  gs.spawnCount++;
  const batch = currentSpawnBatch();
  gs.spawnPower = (gs.spawnPower || 1) * SPAWN_GROWTH; // 増え続ける
  const spawnPts = Math.round(500 * comboMult()); // 召喚ごとに+500×コンボ倍率
  if (gs.allyDemonSpawned && gs.wave >= 5) {
    gs.wave5SpecialCount = (gs.wave5SpecialCount || 0) + 1;
    const spawnSpecial = gs.wave5SpecialCount % 5 === 0;
    const gobCount = Math.min(Math.max(5, batch * 5), allySlotsLeft());
    for (let i = 0; i < gobCount; i++) {
      const g = makeUnit('goblin', 'ally', 60 + (i % 10) * 12);
      gs.units.push(g);
    }
    if (spawnSpecial) {
      const specialType = Math.random() < 0.5 ? 'allycat' : 'allybat';
      const sp = makeUnit(specialType, 'ally', 40);
      gs.units.push(sp);
      const label = specialType === 'allycat' ? '魔猫参上！' : '魔蝙蝠参上！';
      const color = specialType === 'allycat' ? '#ff88dd' : '#88aaff';
      gs.effects.push({type:'spawn', x:80, y:GROUND-60, timer:700, color});
      gs.effects.push({type:'msg', x:160, y:GROUND-80, timer:1100, text:label, color, size:20});
    }
    gs.effects.push({type:'spawn', x:80, y:GROUND-22, timer:600, color:'#aa44ff'});
    gs.effects.push({type:'msg', x:140, y:GROUND-60, timer:900, text:`×${gobCount}！`, color:'#cc88ff', size:22});
    addScore(spawnPts * gobCount, 80, GROUND-75);
    return;
  }
  const count = Math.min(batch, allySlotsLeft());
  for (let i = 0; i < count; i++) {
    gs.units.push(makeUnit('soldier', 'ally', 68 + (i % 10) * 10));
  }
  gs.effects.push({type:'spawn', x:80, y:GROUND-22, timer:500, color:'#4dff6e'});
  if (count >= 2) {
    gs.effects.push({type:'msg', x:140, y:GROUND-60, timer:900, text:`×${count} 召喚！`, color:'#4dff6e', size:22});
  }
  addScore(spawnPts * count, 80, GROUND-75);
}

// ═══════════════════════════════════════════════
// BOSS SPECIAL ATTACKS
// ═══════════════════════════════════════════════
function doBossSpecial(boss) {
  const allies = gs.units.filter(u => u.side==='ally' && u.state!=='dead');
  switch (boss.type) {
    case 'amoeba': {
      // Blob projectile toward nearest ally
      const near = allies.reduce((a,b) => Math.abs(b.x-boss.x)<Math.abs(a.x-boss.x)?b:a, {x:-9999});
      if (near.x > -9999) {
        gs.effects.push({type:'blob', x:boss.x, y:GROUND-18, tx:near.x, ty:GROUND-18,
          timer:1200, maxT:1200, targetId:near.id, dmg:Math.round(boss.dmg*1.5)});
        gs.effects.push({type:'msg', x:boss.x-20, y:GROUND-90, timer:800, text:'ぷにょ～！', color:'#88ff55'});
      }
      break;
    }
    case 'cat': {
      // 魔猫の爪ひっかき — 前方3体に魔法の爪痕＋スタン
      const targets = allies.slice().sort((a,b)=>b.x-a.x).slice(0,3);
      gs.effects.push({type:'msg', x:boss.x, y:GROUND-150, timer:1000, text:'シャーッ！', color:'#ff66cc', size:22});
      targets.forEach((t,i) => {
        const ty = GROUND - (t.spriteH||14) * S / 2;
        for (let k=0; k<3; k++) {
          gs.effects.push({type:'slash', x:t.x+(k-1)*8, y:ty-(k-1)*6, timer:350, side:'enemy'});
        }
        gs.effects.push({type:'explosion', x:t.x, y:GROUND-30, timer:450, maxT:450, r:55, color:'#ff99dd', color2:'#cc2288'});
        t.hp -= Math.round(boss.dmg*1.6);
        t.stunTimer = 900;
        if (t.hp <= 0) t.state = 'dead';
      });
      // ネコの鳴き声＋ひっかき音
      tone(900, 0.18, 'sawtooth', 0.08, 1500);
      tone(1400, 0.12, 'square', 0.05, 600);
      tone(500, 0.2, 'triangle', 0.06, 1100);
      break;
    }
    case 'bat': {
      // 大蝙蝠の超音波 — 近距離音波リング＋範囲内ダメージ
      gs.effects.push({type:'msg', x:boss.x, y:GROUND-150, timer:1000, text:'キィィィン！', color:'#aaccff', size:22});
      for (let r=1; r<=3; r++) {
        gs.effects.push({type:'shockwave', x:boss.x, y:GROUND-60, timer:400+r*90, maxT:400+r*90, r:r*40, color:'#bbddff'});
      }
      for (const a of allies) {
        if (Math.abs(a.x - boss.x) < 120) {
          a.hp -= Math.round(boss.dmg*0.4);
          if (a.hp <= 0) a.state = 'dead';
        }
      }
      // 甲高い超音波スイープ
      tone(2200, 0.35, 'sine', 0.07, 700);
      tone(1700, 0.3, 'sine', 0.06, 900);
      tone(140, 0.25, 'sawtooth', 0.05, 80);
      break;
    }
    case 'demonlord': {
      // Dark flame explosion AoE — wide screen-filling blast
      gs.effects.push({type:'explosion', x:boss.x, y:GROUND-30, timer:1400, maxT:1400, r:260, color:'#ff2200', color2:'#440000'});
      gs.effects.push({type:'explosion', x:boss.x, y:GROUND-20, timer:1000, maxT:1000, r:180, color:'#ff6600', color2:'#aa1100'});
      // Shockwave rings spreading outward
      for (let r=1; r<=4; r++) {
        gs.effects.push({type:'shockwave', x:boss.x, y:GROUND-20, timer:500+r*150, maxT:500+r*150, r:r*65, color:'#ff4400'});
      }
      for (let i=0; i<14; i++) {
        gs.effects.push({type:'ember', x:boss.x+(Math.random()-0.5)*200, y:GROUND-20-Math.random()*120, timer:900+Math.random()*600, color: i%2===0 ? '#ff4400' : '#ff8800'});
      }
      for (const a of allies) {
        const dist = a.x - boss.x; // negative = ally is to the left of boss
        if (Math.abs(dist) < 300) {
          a.hp -= Math.round(boss.dmg * 1.2);
          if (a.hp <= 0) { a.state='dead'; }
          else {
            if (a.isHero) heroHit(a);
            a.x = Math.max(80, a.x - 120);
            if (a.state==='fight') { a.state='walk'; a.target=null; }
          }
        }
      }
      gs.effects.push({type:'msg', x:boss.x, y:GROUND-180, timer:1200, text:'暗黒大爆炎！', color:'#ff4400'});
      tone(80, 0.5, 'sawtooth', 0.1, 60);
      break;
    }
    case 'god': {
      // 三連斜め神罰 — 時間差で3本の斜めビーム
      const sorted = allies.slice().sort((a,b)=>b.x-a.x);
      const targetsCopy = sorted.slice(0, 3).map(t => ({id: t.id, x: t.x}));
      const bossX = boss.x;
      const bossDmg = boss.dmg;
      gs.effects.push({type:'msg', x:bossX, y:GROUND-200, timer:2800, text:'神の裁き！', color:'#ffee00'});
      [0, 750, 1500].forEach((delay, i) => {
        const tgt = targetsCopy[i];
        const tx = tgt ? tgt.x : bossX - 140*(i+1);
        setTimeout(() => {
          if (gs.state !== 'playing') return;
          // チャージ粒子
          for (let p=0; p<10; p++) {
            const ang = Math.random()*Math.PI*2;
            gs.effects.push({type:'divineParticle', x:bossX+Math.cos(ang)*30, y:GROUND-140+Math.sin(ang)*30, timer:300, maxT:300});
          }
          setTimeout(() => {
            if (gs.state !== 'playing') return;
            // 斜めビーム（神から地上の標的へ）
            gs.effects.push({type:'diagBeam', x1:bossX-10, y1:GROUND-200, x2:tx, y2:GROUND, timer:1000, maxT:1000});
            gs.effects.push({type:'explosion', x:tx, y:GROUND-10, timer:900, maxT:900, r:120, color:'#ffffff', color2:'#ffee00'});
            gs.effects.push({type:'explosion', x:tx, y:GROUND-10, timer:650, maxT:650, r:70, color:'#ffffcc', color2:'#ffaa00'});
            for (let r=1; r<=5; r++) {
              gs.effects.push({type:'shockwave', x:tx, y:GROUND, timer:300+r*80, maxT:300+r*80, r:r*45, color:'#ffee44'});
            }
            for (let e=0; e<8; e++) {
              const ea = Math.random()*Math.PI*2;
              gs.effects.push({type:'ember', x:tx, y:GROUND-15, timer:700, maxT:700, color:'#ffdd33', vx:Math.cos(ea)*2.5, vy:-Math.abs(Math.sin(ea))*3});
            }
            const unit = gs.units.find(u => u.id === tgt?.id && u.state !== 'dead');
            if (unit) {
              unit.hp -= Math.round(bossDmg * 1.5);
              if (unit.hp <= 0) unit.state = 'dead';
            }
            tone(880 + i*330, 0.5, 'sine', 0.12, 440 + i*110);
          }, 180);
        }, delay);
      });
      break;
    }
  }
}

// 勇者の被弾リアクション：hitフレーム表示＋地面に沿って後ろへノックバック
function heroHit(h) {
  if (h.state === 'dead') return;
  h.hitT = 700;
  h.x = Math.max(40, h.x - 14);
}

// ═══════════════════════════════════════════════
// UNIT UPDATE
// ═══════════════════════════════════════════════
function updateUnits(dt) {
  const allUnits = gs.boss ? [...gs.units, gs.boss] : [...gs.units];

  for (const u of allUnits) {
    if (u.state === 'dead') continue;
    if (u.landingY !== undefined) continue; // 勇者着地中は戦闘スキップ
    if (u.risingY !== undefined) continue;  // 魔王浮上中は戦闘スキップ
    u.animTimer += dt;
    const _fc = IMAGE_DEFS[u.type]?.frames?.length || 2;
    // 勇者は攻撃中（fight）は足が歩いて見えないようアニメを止める
    if (u.isHero && u.state === 'fight') {
      u.animFrame = 0;
    } else if (u.animTimer > 420) {
      u.animFrame = (u.animFrame+1)%_fc; u.animTimer = 0;
    }
    if (u.lungeT > 0) u.lungeT -= dt;
    if (u.hitT > 0) u.hitT -= dt;

    // Boss special timer
    if (u.isBoss) {
      u.specialTimer += dt;
      if (u.specialTimer >= u.specialRate) {
        u.specialTimer = 0;
        doBossSpecial(u);
      }
    }

    if (u.state === 'fight') {
      if (!u.target || u.target.state === 'dead') {
        u.state = 'walk'; u.target = null; continue;
      }
      u.attackTimer += dt;
      if (u.attackTimer >= u.atkRate) {
        u.attackTimer = 0;
        u.target.hp -= u.dmg;
        const ty = GROUND - u.target.spriteH * S / 2;
        if (u.type === 'archer') {
          const sy = GROUND - u.spriteH * S / 2;
          gs.effects.push({type:'spell', x1:u.x+(u.side==='ally'?12:-12), y1:sy-10,
            x2:u.target.x, y2:ty, timer:250, maxT:250});
        } else if (u.type === 'hero') {
          const ax = u.target.x;
          // 突進モーション
          u.lungeT = 260;
          // 斬撃アーク＋黄色閃光
          gs.effects.push({type:'slash', x:ax, y:ty, timer:280, side:u.side});
          gs.effects.push({type:'explosion', x:ax, y:GROUND-60, timer:450, maxT:450, r:95, color:'#ffee00', color2:'#ffaa00'});
          tone(680, 0.12, 'square', 0.07, 1100);
          tone(220, 0.18, 'sawtooth', 0.06, 90);
          const isDemonFight = u.target.isBoss && u.target.type === 'demonlord';
          if (isDemonFight) {
            if (!u.senkenUsed) {
              // 初回のみ「聖剣一閃！」特大演出
              u.senkenUsed = true;
              gs.effects.push({type:'msg', x:ax, y:GROUND-150, timer:900, text:'聖剣一閃！', color:'#ffe066', size:24});
              gs.effects.push({type:'explosion', x:ax, y:GROUND-70, timer:700, maxT:700, r:170, color:'#ffffff', color2:'#ffdd00'});
              for (let r=1; r<=3; r++) gs.effects.push({type:'shockwave', x:ax, y:GROUND-20, timer:300+r*120, maxT:300+r*120, r:r*55, color:'#ffe066'});
              tone(110, 0.5, 'sawtooth', 0.13, 55);
            }
            // 約2秒間隔で連続攻撃を抑制（戦いを見せる）
            u.attackTimer = -1200;
          }
        } else if (u.type === 'allydemon') {
          // 魔王スペシャルと同じ見た目の爆炎攻撃
          const ax = u.target.x;
          gs.effects.push({type:'explosion', x:ax, y:GROUND-30, timer:1000, maxT:1000, r:160, color:'#ff2200', color2:'#440000'});
          gs.effects.push({type:'explosion', x:ax, y:GROUND-20, timer:700,  maxT:700,  r:100, color:'#ff6600', color2:'#aa1100'});
          for (let r=1; r<=3; r++) {
            gs.effects.push({type:'shockwave', x:ax, y:GROUND-20, timer:300+r*100, maxT:300+r*100, r:r*45, color:'#ff4400'});
          }
          for (let i=0; i<6; i++) {
            const ang = (i/6)*Math.PI*2;
            gs.effects.push({type:'ember', x:ax+Math.cos(ang)*10, y:GROUND-20, timer:500, maxT:500, color:'#ff6600'});
          }
          tone(120, 0.3, 'sawtooth', 0.09, 80);
          // 魔王⇔神 ノックバック（Wave5）
          if (gs.wave === 5 && u.target.type === 'god') {
            u.target.x = Math.min(CW - 40, u.target.x + 60);
            u.x = Math.max(40, u.x - 35);
          }
        } else if (u.isBoss && u.type === 'god') {
          // 神の通常攻撃：黄金の打撃エフェクト
          const ax = u.target.x;
          gs.effects.push({type:'explosion', x:ax, y:GROUND-50, timer:500, maxT:500, r:100, color:'#ffffcc', color2:'#ffcc00'});
          gs.effects.push({type:'diagBeam', x1:u.x, y1:GROUND-160, x2:ax, y2:GROUND-30, timer:400, maxT:400});
          for (let r=1; r<=3; r++) gs.effects.push({type:'shockwave', x:ax, y:GROUND-20, timer:200+r*80, maxT:200+r*80, r:r*38, color:'#ffee44'});
          tone(220, 0.3, 'sine', 0.09, 280);
        } else if (u.isBoss && u.type === 'cat') {
          // 魔猫の通常攻撃：爪のひっかき（2連スラッシュ）
          const ax = u.target.x;
          gs.effects.push({type:'slash', x:ax, y:ty, timer:260, side:'enemy'});
          gs.effects.push({type:'slash', x:ax+6, y:ty-8, timer:260, side:'enemy'});
          gs.effects.push({type:'explosion', x:ax, y:GROUND-25, timer:300, maxT:300, r:35, color:'#ff99dd', color2:'#cc2288'});
          tone(760, 0.12, 'sawtooth', 0.06, 1300);
        } else if (u.isBoss && u.type === 'bat') {
          // 大蝙蝠の通常攻撃：急降下の体当たり＋小音波
          const ax = u.target.x;
          gs.effects.push({type:'slash', x:ax, y:ty, timer:240, side:'enemy'});
          for (let r=1; r<=2; r++) gs.effects.push({type:'shockwave', x:ax, y:GROUND-40, timer:200+r*70, maxT:200+r*70, r:r*28, color:'#bbddff'});
          tone(1600, 0.1, 'sine', 0.05, 600);
        } else {
          gs.effects.push({type:'slash', x:u.target.x, y:ty, timer:280, side:u.side});
        }
        if (u.target.hp <= 0) {
          u.target.state = 'dead';
          if (u.target.side === 'enemy') {
            if (u.target.isBoss) {
              addScore(u.target.score * 10, u.target.x, GROUND-100);
              onBossDead();
            } else {
              addScore(500, u.target.x, GROUND-55);
            }
          }
          u.state = 'walk'; u.target = null;
        }
      }
    } else {
      // Stun check
      if (u.stunTimer > 0) { u.stunTimer -= dt; continue; }
      const dir = u.side === 'ally' ? 1 : -1;
      u.x += u.speed * dir * dt;

      // Wave5: 神は x=370〜560 の戦場に固定。城まで突っ込まず、右に詰められすぎない
      if (u === gs.boss && gs.wave === 5 && u.type === 'god') {
        if (u.x < 370) u.x = 370;
        if (u.x > 560) u.x = 560;
      }
      // Boss appears when first ally crosses into enemy territory
      if (u.side === 'ally' && u.x >= 560 && !gs.bossSpawned && !gs.boss && gs.state === 'playing') {
        triggerBossSpawn();
      }

      // Castle wall: ally dies here; damages castle only after boss is out
      if (u.side === 'ally' && u.x >= 726) {
        // Wave5: 神が生きている間は城を壊せない（神討伐がクライマックス）
        const castleLocked = gs.wave === 5 && gs.boss && gs.boss.type === 'god';
        if (gs.bossSpawned && !castleLocked) {
          gs.enemyCastleHP = Math.max(0, gs.enemyCastleHP - 40);
          gs.effects.push({type:'hit', x:750, y:GROUND-50, timer:380});
          if (gs.enemyCastleHP <= 0 && gs.state === 'playing') {
            onWaveClear();
          }
        }
        u.state = 'dead';
        continue;
      }

      if (u.side === 'enemy' && u.x <= 68) {
        endGame('lose');
        return;
      }

      // Build candidate list for targeting
      const enemies = allUnits.filter(e => e.side !== u.side && e.state !== 'dead');
      let best = null, bestDist = Infinity;
      for (const e of enemies) {
        const d = Math.abs(e.x - u.x);
        if (d > u.range) continue;
        if (u.type === 'archer') {
          const mRange = u.meleeRange || 40;
          if (d >= mRange) { if (d < bestDist) { best = e; bestDist = d; } }
          else if (!best)  { best = e; bestDist = d; }
        } else {
          if (d < bestDist) { best = e; bestDist = d; }
        }
      }
      if (best) { u.state = 'fight'; u.target = best; }
    }
  }

  // Check boss hp from direct hits
  if (gs.boss && gs.boss.hp <= 0 && gs.boss.state !== 'dead') {
    gs.boss.state = 'dead';
    addScore(gs.boss.score * 10, gs.boss.x, GROUND-120);
    onBossDead();
  }

  gs.units = gs.units.filter(u => u.state !== 'dead');
  if (gs.boss && gs.boss.state === 'dead') gs.boss = null;
}

function triggerBossSpawn() {
  if (gs.bossSpawned || gs.boss) return;
  gs.bossSpawned = true;
  playBossSpawn();

  // Knockback all enemies
  for (const u of gs.units) {
    if (u.side === 'enemy') {
      u.x = Math.min(720, u.x + 100);
      if (u.state === 'fight') { u.state = 'walk'; u.target = null; }
    }
  }

  const boss = makeBoss(gs.wave);
  gs.boss = boss;
  gs.waveMsg = {text:`⚠ ${BOSS_DEFS[gs.wave-1].name} 出現！`, timer:2500, color:'#ff4400'};

  // ボス BGM：WARNING → 通常曲フェードアウト → 約0.5秒の間 → ボス曲
  const bossBgmKey = {cat:'boss2', bat:'boss3', demonlord:'demon', god:'boss5'}[boss.type];
  if (bossBgmKey) {
    stopBGM(1300);
    setTimeout(() => playBGM(bossBgmKey, { fadeMs: 1800 }), 1800);
  }

  // 魔王登場テロップ＋効果音（敵・Wave4）
  if (boss.type === 'demonlord') {
    gs.effects.push({type:'msg', x:CW/2, y:CH/2-20, timer:3000, text:'魔王が現れた！', color:'#ff2200', size:36});
    gs.effects.push({type:'explosion', x:CW/2, y:GROUND-40, timer:800, maxT:800, r:200, color:'#440000', color2:'#ff2200'});
    for (let r=1; r<=4; r++) {
      gs.effects.push({type:'shockwave', x:CW/2, y:GROUND-20, timer:400+r*150, maxT:400+r*150, r:r*70, color:'#ff2200'});
    }
    playDemonBirth();
  }

  // 神・降臨（Wave5）— 派手な天罰演出＋場の兵士を一掃
  if (boss.type === 'god') {
    gs.effects.push({type:'msg', x:CW/2, y:CH/2-30, timer:3200, text:'神、降臨', color:'#fff7c0', size:42});
    // 画面全体を覆う黄金の閃光・衝撃波
    gs.effects.push({type:'explosion', x:CW/2, y:GROUND-40, timer:1100, maxT:1100, r:CW, color:'#ffffff', color2:'#ffe066'});
    gs.effects.push({type:'explosion', x:boss.x, y:GROUND-60, timer:900, maxT:900, r:280, color:'#fff7c0', color2:'#ffcc00'});
    for (let r=1; r<=7; r++) {
      gs.effects.push({type:'shockwave', x:CW/2, y:GROUND-20, timer:400+r*120, maxT:400+r*120, r:r*70, color:'#ffe066'});
    }
    for (let p=0; p<28; p++) {
      const ang = Math.random()*Math.PI*2;
      gs.effects.push({type:'divineParticle', x:CW/2+Math.cos(ang)*60, y:GROUND-120+Math.sin(ang)*60, timer:1000, maxT:1000});
    }
    // 神の威光：場にいる味方兵士（魔王以外）を一掃。城付近に降臨ビームを落とす
    for (const a of gs.units) {
      if (a.side === 'ally' && a.type !== 'allydemon' && a.state !== 'dead') {
        gs.effects.push({type:'diagBeam', x1:boss.x-10, y1:GROUND-200, x2:a.x, y2:GROUND, timer:700, maxT:700});
        gs.effects.push({type:'explosion', x:a.x, y:GROUND-10, timer:600, maxT:600, r:55, color:'#ffffcc', color2:'#ffee00'});
        a.state = 'dead';
      }
    }
    playBossSpawn();
    tone(110, 0.8, 'sawtooth', 0.14, 70);
    tone(220, 0.6, 'sine',     0.10, 440);
  }

  updateBossBar();
}

function onBossDead() {
  playBossDie();
  gs.boss = null;
  // Keep gs.bossSpawned = true so no second boss spawns this wave
  const bossName = BOSS_DEFS[gs.wave-1].name;
  gs.effects.push({type:'msg', x:CW/2, y:CH/2-40, timer:2000, text:`${bossName} を倒した！`, color:'#FFD700'});
  updateBossBar();
  onWaveClear();
}

function onWaveClear() {
  if (gs.state === 'waveclear') return;
  gs.state = 'waveclear';
  if (gs.wave >= 5) {
    gs.waveMsg = {text:'神を倒した！全Wave制覇！', timer:3000, color:'#FFD700'};
    setTimeout(() => endGame('win'), 3200);
  } else {
    gs.waveMsg = {text:`WAVE ${gs.wave} クリア！`, timer:2500, color:'#4dff6e'};
    setTimeout(() => { gs.waitingForEnter = true; }, 2600);
  }
}

function startNextWave() {
  gs.wave++;
  gs.waveTime = 0;
  gs.bossSpawned = false;
  gs.boss = null;
  gs.units = [];
  gs.effects = [];
  gs.goblinTimer = -3000;
  gs.hobTimer = 0;
  gs.waitingForEnter = false;
  gs.heroSpawned = false;
  gs.allyDemonSpawned = false;
  gs.heroMsg = null;
  gs.recentWords = [];
  gs.enemyCastleHP = enemyCastleMaxHPForWave(gs.wave);
  gs.enemyCastleMaxHP = gs.enemyCastleHP;
  gs.state = 'playing';
  document.getElementById('waveNum').textContent = gs.wave;
  gs.waveMsg = {text:`⚔ WAVE ${gs.wave} ⚔`, timer:2500, color:'#FFD700'};
  playWave();
  // BGM: Wave2 以降は通常曲（Wave1 のみ専用曲）
  playBGM(gs.wave === 1 ? 'wave1' : 'normal', { fadeMs: 2000 });
  updateEnemyCastleHud();
  nextWord();
  document.getElementById('type-input').focus();
}

// ═══════════════════════════════════════════════
// EFFECT PROJECTILE RESOLUTION
// ═══════════════════════════════════════════════
function updateEffects(dt) {
  for (const e of gs.effects) {
    e.timer -= dt;
    // Blob / bolt projectile hit resolution
    if ((e.type === 'blob' || e.type === 'bolt') && e.timer <= 0) {
      const tgt = gs.units.find(u => u.id === e.targetId && u.state !== 'dead');
      if (tgt) {
        tgt.hp -= e.dmg;
        if (e.stun) tgt.stunTimer = (tgt.stunTimer||0) + e.stun;
        if (tgt.hp <= 0) tgt.state = 'dead';
        gs.effects.push({type:'hit', x:tgt.x, y:GROUND-tgt.spriteH*S/2, timer:380});
      }
    }
  }
  gs.effects = gs.effects.filter(e => e.timer > 0);
  if (gs.waveMsg) { gs.waveMsg.timer -= dt; if (gs.waveMsg.timer <= 0) gs.waveMsg = null; }
  if (gs.heroMsg) { gs.heroMsg.timer -= dt; if (gs.heroMsg.timer <= 0) gs.heroMsg = null; }
}

function spawnEnemies(dt) {
  if (gs.state !== 'playing') return;
  gs.goblinTimer += dt;
  gs.hobTimer += dt;
  if (gs.goblinTimer >= goblinInterval()) {
    gs.goblinTimer = 0;
    gs.units.push(makeUnit('goblin','enemy',730));
  }
  if (gs.hobTimer >= hobInterval()) {
    gs.hobTimer = 0;
    gs.units.push(makeUnit('hobgoblin','enemy',730));
  }

  // Force boss if wave time exceeded
  if (!gs.bossSpawned && !gs.boss) {
    const forceT = BOSS_FORCE_TIMES[gs.wave-1];
    if (gs.waveTime >= forceT) {
      triggerBossSpawn();
    }
  }

  // Wave5: 開始20秒で味方魔王出現（ボスサイズ・下から浮上）
  if (!gs.allyDemonSpawned && gs.wave >= 5 && gs.waveTime >= 40000) {
    gs.allyDemonSpawned = true;
    const ad = makeUnit('allydemon', 'ally', 200);
    ad.dmg *= 2; // Wave5: 神との死闘用。一方的にならない数値
    ad.isBossScale = true; // ボスと同じスケールで描画
    ad.risingY = GROUND + ad.spriteH * BS + 20; // 地面の下からスタート
    ad.risingTarget = GROUND;
    ad.risingSpeed = 0.12; // px/ms
    gs.units.push(ad);
    gs.effects.push({type:'msg', x:CW/2, y:CH/2-40, timer:2000, text:'地の底が、揺れる…', color:'#aa00ff'});
  }

  // 勇者: Wave2・Wave3 — 敵が城手前（x≤200）に来たら緊急サポート降臨（1回だけ）
  if (!gs.heroSpawned && (gs.wave === 2 || gs.wave === 3)) {
    const nearEnemy = gs.units.find(u => u.side === 'enemy' && u.state !== 'dead' && u.x <= 200);
    if (nearEnemy) {
      gs.heroSpawned = true;
      const hero = makeUnit('hero', 'ally', 110);
      hero.landingY = -hero.spriteH * S * 1.5;
      hero.landingTarget = GROUND;
      hero.landingSpeed = 0.6;
      gs.units.push(hero);
      playHeroFanfare();
      gs.heroMsg = { timer: 3500 };
      gs.effects.push({type:'msg', x:CW/2, y:CH/2-40, timer:2200, text:'助けに来た！', color:'#ffe066', size:30});
    }
  }

  // 勇者: Wave4 のみ、1分30秒後に1回だけ出現 (空から落下)
  if (!gs.heroSpawned && gs.wave === 4 && gs.waveTime >= 90000) {
    gs.heroSpawned = true;
    const hero = makeUnit('hero', 'ally', 110); // 味方の城・リスポーン地点付近に降臨
    hero.landingY = -hero.spriteH * S * 1.5;
    hero.landingTarget = GROUND;
    hero.landingSpeed = 0.6;
    gs.units.push(hero);
    playHeroFanfare();
    gs.heroMsg = { timer: 3500 };
    // Wave4: 勇者誕生BGM（1回再生）→ 終わったら魔王戦BGMに戻る
    playBGM('hero', { fadeMs: 1200, loop: false, onEnd: () => {
      if (gs.state === 'playing' && gs.wave === 4) playBGM('demon', { fadeMs: 1500 });
    }});
  }
}

function updateHeroLanding(dt) {
  for (const u of gs.units) {
    if (u.isHero && u.landingY !== undefined) {
      u.landingY += u.landingSpeed * dt;
      if (u.landingY >= u.landingTarget) {
        // 着地！降臨地点（味方の城付近）でそのまま着地
        const hx = u.x;
        delete u.landingY;
        delete u.landingTarget;
        delete u.landingSpeed;
        // 着地爆発エフェクト（大爆発）
        gs.effects.push({type:'explosion', x:hx, y:GROUND, timer:1800, maxT:1800, r:340, color:'#ffe066', color2:'#ffd700'});
        gs.effects.push({type:'explosion', x:hx, y:GROUND, timer:1400, maxT:1400, r:240, color:'#ffffff', color2:'#fff0a0'});
        gs.effects.push({type:'explosion', x:hx, y:GROUND, timer:1000, maxT:1000, r:150, color:'#ffe066', color2:'#ff8800'});
        for (let r=1; r<=6; r++) {
          gs.effects.push({type:'shockwave', x:hx, y:GROUND, timer:600+r*100, maxT:600+r*100, r:r*60, color:'#ffd700'});
        }
        for (let i=0; i<20; i++) {
          const angle = (i/20)*Math.PI*2;
          const spd = 1.5 + Math.random()*2;
          gs.effects.push({type:'ember', x:hx+Math.cos(angle)*20, y:GROUND-20, timer:1200, maxT:1200, color:'#ffd700', vx:Math.cos(angle)*spd, vy:-spd*1.5});
        }
        // ノックバック: 着地衝撃で前方の味方を少し押し出す
        for (const a of gs.units) {
          if (a.side === 'ally' && !a.isHero && a.x < hx + 120) {
            a.x = Math.min(CW - 60, a.x + 50);
            if (a.state === 'fight') { a.state = 'walk'; a.target = null; }
          }
        }
      }
    }
  }
}

// 魔王 vs 神　衝突ノックバック
const CLASH_COOLDOWN = 1200; // ms
if (!window._clashCooldown) window._clashCooldown = 0;
function updateBossClash(dt) {
  window._clashCooldown = Math.max(0, window._clashCooldown - dt);
  if (window._clashCooldown > 0) return;
  const god = gs.boss && gs.boss.type === 'god' ? gs.boss : null;
  const demon = gs.units.find(u => u.type === 'allydemon' && u.state !== 'dead' && u.risingY === undefined);
  if (!god || !demon) return;
  const dist = Math.abs(god.x - demon.x);
  if (dist > 80) return;

  // ノックバック：互いに押し合い、神は戦場内（370〜560）に収める
  const kbGod   = god.x   < demon.x ? -30 : 30;
  const kbDemon = demon.x < god.x   ? -50 : 50;
  god.x   = Math.max(370, Math.min(560, god.x   + kbGod));
  demon.x = Math.max(180, Math.min(560, demon.x + kbDemon));

  // ダメージ：互角気味の死闘（魔王がやや押し勝つ）
  god.hp   = Math.max(1, god.hp   - 120);
  demon.hp = Math.max(1, demon.hp - 60);

  // エフェクト
  const mx = (god.x + demon.x) / 2;
  gs.effects.push({type:'explosion', x:mx, y:GROUND-60, timer:600, maxT:600, r:120, color:'#ffffff', color2:'#ffaa00'});
  gs.effects.push({type:'shockwave', x:mx, y:GROUND-30, timer:400, maxT:400, r:160, color:'#ffdd00'});
  gs.effects.push({type:'msg', x:mx, y:GROUND-120, timer:700, text:'激突！', color:'#ffffff', size:28});

  // 効果音（重い衝突音）
  tone(80,  0.4, 'sawtooth', 0.12, 60);
  tone(120, 0.3, 'square',   0.08, 80);
  tone(200, 0.2, 'sine',     0.06, 40);

  window._clashCooldown = CLASH_COOLDOWN;
}

function updateAllyDemonRising(dt) {
  for (const u of gs.units) {
    if (u.type === 'allydemon' && u.risingY !== undefined) {
      // 暗黒の渦エフェクト（浮上中）
      if (Math.random() < 0.4) {
        const angle = Math.random() * Math.PI * 2;
        const r = 20 + Math.random() * 40;
        gs.effects.push({type:'darkVortex', x: u.x + Math.cos(angle)*r, y: u.risingY + Math.random()*30, timer:600, maxT:600});
      }
      u.risingY -= u.risingSpeed * dt;
      if (u.risingY <= u.risingTarget) {
        delete u.risingY;
        delete u.risingTarget;
        delete u.risingSpeed;
        // 浮上完了：暗黒爆発＋「魔王爆誕！」
        gs.effects.push({type:'explosion', x:u.x, y:GROUND, timer:1400, maxT:1400, r:300, color:'#550088', color2:'#220044'});
        gs.effects.push({type:'explosion', x:u.x, y:GROUND, timer:900,  maxT:900,  r:190, color:'#8800cc', color2:'#440066'});
        for (let r=1; r<=6; r++) {
          gs.effects.push({type:'shockwave', x:u.x, y:GROUND, timer:400+r*120, maxT:400+r*120, r:r*60, color:'#aa00ff'});
        }
        gs.effects.push({type:'msg', x:CW/2, y:CH/2-30, timer:3000, text:'魔王爆誕！', color:'#cc66ff', size:40});
        playDemonBirth();
      }
    }
  }
}

// ═══════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════
function updateBossBar() {
  const wrap = document.getElementById('boss-bar-wrap');
  const fill = document.getElementById('boss-bar-fill');
  const nameEl = document.getElementById('boss-name');
  const hpTxt = document.getElementById('boss-hp-txt');
  if (gs.boss && gs.boss.state !== 'dead') {
    wrap.style.display = 'block';
    nameEl.style.display = 'inline';
    hpTxt.style.display = 'inline';
    nameEl.textContent = BOSS_DEFS[gs.wave-1].name;
    const pct = Math.max(0, gs.boss.hp / gs.boss.maxHp * 100);
    fill.style.width = pct + '%';
    hpTxt.textContent = `${Math.max(0,gs.boss.hp)}/${gs.boss.maxHp}`;
  } else {
    wrap.style.display = 'none';
    nameEl.style.display = 'none';
    hpTxt.style.display = 'none';
  }
}

function updateEnemyCastleHud() {
  const hp = Math.max(0, gs.enemyCastleHP || 0);
  const maxHp = gs.enemyCastleMaxHP || 1;
  document.getElementById('enemyCastleHpNum').textContent = `${hp}/${maxHp}`;
  const pct = hp / maxHp * 100;
  document.getElementById('enemy-castle-bar-fill').style.width = pct + '%';
  document.getElementById('enemy-castle-bar-fill').style.background =
    pct > 50 ? 'linear-gradient(90deg,#cc1111,#ff6600)' :
    pct > 25 ? 'linear-gradient(90deg,#880000,#cc3300)' :
               'linear-gradient(90deg,#440000,#880000)';
}

function addScore(pts, x, y) {
  gs.score += pts;
  const s = gs.score.toLocaleString();
  const big = document.getElementById('scoreBig');
  if (big) {
    big.textContent = s;
    big.style.transform = 'scale(1.25)';
    setTimeout(() => { big.style.transform = 'scale(1)'; }, 120);
  }
  if (x !== undefined) {
    gs.effects.push({type:'msg', x, y: y ?? GROUND-55, timer:800, text:`+${pts}`, color:'#FFD700', size:20});
  }
}

function updateHUD() {
  const big = document.getElementById('scoreBig');
  if (big) big.textContent = gs.score.toLocaleString();
  const sec = Math.floor(gs.waveTime/1000);
  document.getElementById('timerNum').textContent = `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
  document.getElementById('waveNum').textContent = gs.wave;
  updateBossBar();
  updateEnemyCastleHud();
}

// ═══════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════
function drawBackground() {
  const sky = ctx.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#06061e'); sky.addColorStop(1,'#141840');
  ctx.fillStyle = sky; ctx.fillRect(0,0,CW,GROUND);
  ctx.fillStyle = '#ffffffbb';
  [[52,18],[148,12],[302,34],[452,9],[598,27],[702,14],[204,48],[552,44],[752,28],[404,19],[102,38],[650,8]].forEach(([x,y])=>ctx.fillRect(x,y,2,2));
  ctx.fillStyle = '#0e1d38';
  for (let mx=0; mx<CW; mx+=90) {
    const mh = 35+Math.sin(mx*0.06)*14;
    ctx.beginPath(); ctx.moveTo(mx,GROUND); ctx.lineTo(mx+45,GROUND-mh); ctx.lineTo(mx+90,GROUND); ctx.fill();
  }
  ctx.fillStyle = '#3a7a22'; ctx.fillRect(0,GROUND,CW,3);
  ctx.fillStyle = '#2d5a1b'; ctx.fillRect(0,GROUND+3,CW,17);
  ctx.fillStyle = '#1a3a0e'; ctx.fillRect(0,GROUND+20,CW,CH-GROUND-20);
}

function drawPlayerCastle() {
  ctx.save();
  const x=0, cTop=145;
  ctx.fillStyle = '#8899aa'; ctx.fillRect(x,cTop,65,GROUND-cTop);
  ctx.fillStyle = '#667788';
  for (let by=cTop; by<GROUND; by+=14)
    for (let bx=x; bx<x+65; bx+=20)
      ctx.fillRect(bx+(by%28<14?0:10), by, 18, 12);
  ctx.fillStyle = '#99aabb'; ctx.fillRect(x,cTop-34,26,34);
  ctx.fillStyle = '#667788'; ctx.fillRect(x,cTop-34,8,11); ctx.fillRect(x+18,cTop-34,8,11);
  ctx.fillStyle = '#99aabb'; ctx.fillRect(x+40,cTop-22,25,22);
  ctx.fillStyle = '#667788'; ctx.fillRect(x+40,cTop-22,8,11); ctx.fillRect(x+57,cTop-22,8,11);
  ctx.fillStyle = '#2266dd'; ctx.fillRect(x+9,cTop-56,3,24);
  ctx.fillStyle = '#5599ff'; ctx.fillRect(x+12,cTop-56,16,11);
  ctx.fillStyle = '#1a2a3a'; ctx.fillRect(x+22,GROUND-32,20,32);
  ctx.fillStyle = '#334455'; ctx.fillRect(x+24,GROUND-30,16,4); ctx.fillRect(x+24,GROUND-22,16,4);
  ctx.restore();
}

function drawEnemyCastle() {
  ctx.save();
  const x=736, cTop=128;
  ctx.fillStyle = '#2a1a2e'; ctx.fillRect(x,cTop,64,GROUND-cTop);
  ctx.fillStyle = '#1a0a1e';

    for (let bx=x; bx<x+64; bx+=20)
      ctx.fillRect(bx+(by%28<14?0:10), by, 18, 12);
  ctx.fillStyle = '#3a1a3e'; ctx.fillRect(x+20,cTop-54,24,54);
  ctx.fillStyle = '#2a0a2e'; ctx.fillRect(x+20,cTop-54,8,12); ctx.fillRect(x+36,cTop-54,8,12);
  ctx.fillStyle = '#33153a';
  ctx.fillRect(x,cTop-28,20,28); ctx.fillRect(x+44,cTop-28,20,28);
  ctx.fillStyle = '#220a26';
  ctx.fillRect(x,cTop-28,7,12); ctx.fillRect(x+13,cTop-28,7,12);
  ctx.fillRect(x+44,cTop-28,7,12); ctx.fillRect(x+57,cTop-28,7,12);
  ctx.fillStyle = '#440000'; ctx.fillRect(x+30,cTop-74,3,24);
  ctx.fillStyle = '#cc1111'; ctx.fillRect(x+33,cTop-74,16,11);
  ctx.fillStyle = '#0a0010'; ctx.fillRect(x+22,GROUND-34,20,34);
  ctx.fillStyle = '#ff9900'; ctx.fillRect(x+14,GROUND-54,5,5); ctx.fillRect(x+45,GROUND-54,5,5);
  ctx.fillStyle = '#ffee44'; ctx.fillRect(x+15,GROUND-55,3,2); ctx.fillRect(x+46,GROUND-55,3,2);
  ctx.restore();
}

const BS = S * 2; // boss scale: 2x per axis = 4x area vs soldier

function drawSpriteBoss(ctx, pixels, ox, oy, flipX=false) {
  const rows=pixels.length, cols=pixels[0].length;
  ctx.save();
  ctx.translate(ox, oy);
  if (flipX) { ctx.translate(cols*BS, 0); ctx.scale(-1,1); }
  for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++) {
      const col=pixels[r][c];
      if (col) { ctx.fillStyle=col; ctx.fillRect(c*BS, r*BS, BS, BS); }
    }
  ctx.restore();
}

function drawUnit(u) {
  // 勇者の突進モーション（攻撃時に前方へthrust）
  let _lungeOrig = null;
  if (u.isHero && u.lungeT > 0) {
    const p = 1 - u.lungeT / 260;
    const off = Math.sin(p * Math.PI) * 28 * (u.side === 'enemy' ? -1 : 1);
    _lungeOrig = u.x;
    u.x = u.x + off;
  }
  try {
    drawUnitInner(u);
  } finally {
    if (_lungeOrig !== null) u.x = _lungeOrig;
  }
}
function drawUnitInner(u) {
  // Image sprite (PNG) — try first
  if (imagesReady) {
    let imgDef = IMAGE_DEFS[u.type];
    // ゴブリン/ホブゴブリンのPNGは「味方ゴブリン」または「Wave4の敵」だけ。
    // Wave1-3・Wave5の敵ゴブリンはピクセルアートを使う。
    if ((u.type === 'goblin' || u.type === 'hobgoblin') &&
        !(u.side === 'ally' || gs.wave === 4)) {
      imgDef = null;
    }
    if (imgDef) {
      const frameIdx = u.animFrame % imgDef.frames.length;
      let img = loadedImages[imgDef.frames[frameIdx]];
      // 被弾モーション：hit画像があり読み込めていればそちらを使う
      if ((u.hitT || 0) > 0 && imgDef.hit) {
        const hitImg = loadedImages[imgDef.hit];
        if (hitImg && hitImg.complete && hitImg.naturalWidth) img = hitImg;
      }
      if (drawImageUnit(u, img, imgDef.drawH, imgDef.yOff)) return;
    }
  }
  // Fallback: pixel art
  let sprites;
  if (u.isBoss) {
    sprites = getBossSprites(u.type);
  } else {
    sprites = {
      soldier:   [SPRITE_SOLDIER,   SPRITE_SOLDIER2],
      archer:    [SPRITE_ARCHER,    SPRITE_ARCHER2],
      hero:      [SPRITE_HERO,      SPRITE_HERO2],
      allydemon: [SPRITE_DEMON,     SPRITE_DEMON],
      goblin:    [SPRITE_GOBLIN,    SPRITE_GOBLIN2],
      hobgoblin: [SPRITE_HOBGOBLIN, SPRITE_HOBGOBLIN2],
    }[u.type];
  }
  if (!sprites) return;
  const sprite = sprites[u.animFrame % 2];

  if (u.isBoss || u.isBossScale) {
    const sw = u.spriteW * BS, sh = u.spriteH * BS;
    const groundY = u.risingY !== undefined ? u.risingY : GROUND;
    const ox = Math.round(u.x - sw/2), oy = groundY - sh;
    // 浮上中はクリップして地面以下を隠す
    if (u.risingY !== undefined) {
      ctx.save();
      ctx.beginPath(); ctx.rect(0, 0, CW, GROUND); ctx.clip();
    }
    drawSpriteBoss(ctx, sprite, ox, oy, u.side === 'enemy');
    if (u.risingY !== undefined) ctx.restore();
    if (u.hp < u.maxHp) {
      const pct = Math.max(0, u.hp / u.maxHp);
      ctx.fillStyle = '#0008'; ctx.fillRect(ox-1, oy-10, sw+2, 7);
      ctx.fillStyle = pct>0.5?'#4dff6e':pct>0.25?'#ffcc00':'#ff4136';
      ctx.fillRect(ox, oy-9, Math.round(sw*pct), 5);
    }
  } else {
    const ds = u.drawScale || 1;
    const sw = Math.round(u.spriteW * S * ds), sh = Math.round(u.spriteH * S * ds);
    const drawY = u.landingY !== undefined ? u.landingY : GROUND;
    const ox = Math.round(u.x - sw/2), oy = drawY - sh;
    ctx.save();
    ctx.translate(ox + sw/2, drawY);
    if (u.side === 'enemy') ctx.scale(-ds, ds); else ctx.scale(ds, ds);
    ctx.translate(-u.spriteW*S/2, -u.spriteH*S);
    drawSprite(ctx, sprite, 0, 0, false);
    ctx.restore();
    if (u.hp < u.maxHp) {
      const pct = Math.max(0, u.hp / u.maxHp);
      ctx.fillStyle = '#0008'; ctx.fillRect(ox-1, oy-8, sw+2, 5);
      ctx.fillStyle = pct>0.5?'#4dff6e':pct>0.25?'#ffcc00':'#ff4136';
      ctx.fillRect(ox, oy-7, Math.round(sw*pct), 3);
    }
    // 勇者の着地前: 後光エフェクト
    if (u.isHero && u.landingY !== undefined) {
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 80);
      ctx.save();
      ctx.globalAlpha = 0.35 * pulse;
      const grad = ctx.createRadialGradient(u.x, drawY, 0, u.x, drawY, 60);
      grad.addColorStop(0, '#fff7aa'); grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(u.x, drawY, 60, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

function drawEffects() {
  ctx.save();
  ctx.textAlign = 'center';
  for (const e of gs.effects) {
    const a = Math.min(1, e.timer / 300);
    ctx.globalAlpha = Math.max(0, a);
    if (e.type === 'slash') {
      const age = 1 - e.timer / 280;
      ctx.save();
      ctx.globalAlpha = Math.max(0, 1 - age * 1.5);
      const dx = e.side === 'ally' ? -1 : 1;
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
      ctx.shadowColor = '#88ccff'; ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(e.x + dx*18 - age*10, e.y - 20 + age*5);
      ctx.lineTo(e.x - dx*18 + age*10, e.y + 14 - age*5);
      ctx.stroke();
      ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(e.x + dx*14 - age*8, e.y - 14 + age*4);
      ctx.lineTo(e.x - dx*14 + age*8, e.y + 10 - age*4);
      ctx.stroke();
      ctx.shadowBlur = 0; ctx.restore();
    } else if (e.type === 'spell') {
      const pct = 1 - e.timer / e.maxT;
      const sx = e.x1 + (e.x2 - e.x1) * pct;
      const sy = e.y1 + (e.y2 - e.y1) * pct - Math.sin(pct * Math.PI) * 20;
      ctx.save();
      ctx.shadowColor = '#aa44ff'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#cc88ff'; ctx.beginPath(); ctx.arc(sx, sy, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(sx-2, sy-2, 3, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0; ctx.restore();
    } else if (e.type === 'shockwave') {
      const pct = 1 - e.timer / e.maxT;
      const radius = e.r * (0.3 + pct * 0.7);
      ctx.save();
      ctx.globalAlpha = Math.max(0, 0.8 - pct);
      ctx.strokeStyle = e.color || '#ffdd99'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(e.x, e.y, radius, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    } else if (e.type === 'explosion') {
      const pct = 1 - e.timer / e.maxT;
      ctx.save();
      ctx.globalAlpha = Math.max(0, 0.85 - pct * 1.2);
      const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * (0.3 + pct * 0.7));
      grad.addColorStop(0, e.color || '#ff8800');
      grad.addColorStop(0.5, e.color2 || '#cc1100');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.3 + pct * 0.7), 0, Math.PI*2); ctx.fill();
      ctx.restore();
    } else if (e.type === 'ember') {
      ctx.save();
      ctx.globalAlpha = Math.max(0, e.timer / 700);
      ctx.fillStyle = e.color || '#ff6600';
      ctx.beginPath(); ctx.arc(e.x, e.y - (700 - e.timer) * 0.05, 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    } else if (e.type === 'divinebeam') {
      const pct = e.timer / e.maxT;
      ctx.save();
      ctx.globalAlpha = pct * 0.9;
      const grad = ctx.createLinearGradient(e.x1, 0, e.x2, GROUND);
      grad.addColorStop(0, '#ffffee'); grad.addColorStop(1, '#ffcc00');
      ctx.fillStyle = grad;
      ctx.fillRect(Math.min(e.x1,e.x2)-8, 0, 16, GROUND);
      ctx.fillStyle = 'rgba(255,255,200,0.3)';
      ctx.fillRect(0, 0, CW, GROUND);
      ctx.restore();
    } else if (e.type === 'hit') {
      ctx.fillStyle = '#ffee44'; ctx.font = 'bold 13px monospace';
      ctx.fillText('★', e.x, e.y - (380 - Math.max(0,e.timer)) * 0.04);
    } else if (e.type === 'arrow') {
      const pct = 1 - e.timer / e.maxT;
      const ax = e.x1 + (e.x2 - e.x1) * pct;
      const ay = e.y1 + (e.y2 - e.y1) * pct;
      const angle = Math.atan2(e.y2 - e.y1, e.x2 - e.x1);
      ctx.save(); ctx.translate(ax, ay); ctx.rotate(angle);
      ctx.fillStyle = '#cc8833'; ctx.fillRect(-5,-1,10,2);
      ctx.fillStyle = '#888';   ctx.fillRect(4,-2,4,4);
      ctx.restore();
    } else if (e.type === 'blob') {
      const pct = 1 - e.timer / e.maxT;
      const bx = e.x + (e.tx - e.x) * pct;
      const by = e.y + Math.sin(pct * Math.PI) * -30;
      ctx.fillStyle = '#88ff55'; ctx.beginPath();
      ctx.arc(bx, by, 7, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#55cc33'; ctx.beginPath();
      ctx.arc(bx-3, by-3, 4, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'bolt') {
      const pct = 1 - e.timer / e.maxT;
      const bx = e.x + (e.tx - e.x) * pct;
      const by = e.y;
      ctx.fillStyle = '#cc88ff'; ctx.beginPath();
      ctx.arc(bx, by, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffffff'; ctx.beginPath();
      ctx.arc(bx, by, 3, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'beam') {
      ctx.globalAlpha = Math.max(0, e.timer / e.maxT) * 0.9;
      ctx.strokeStyle = '#ffffaa'; ctx.lineWidth = 6;
      ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); ctx.stroke();
      ctx.shadowBlur = 0; ctx.lineWidth = 1;
    } else if (e.type === 'flame') {
      ctx.globalAlpha = (e.timer / 900) * 0.55;
      const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r);
      grad.addColorStop(0, '#ff8800'); grad.addColorStop(0.5, '#cc1100'); grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'bark' || e.type === 'msg' || e.type === 'word') {
      const sz = e.size || 15;
      const yy = e.y - (800 - Math.max(0,e.timer)) * 0.02;
      ctx.save();
      ctx.font = `bold ${sz}px sans-serif`;
      if (e.size) {
        // 大きいテロップは中央寄せ＋縁取りで目立たせる
        ctx.textAlign = 'center';
        ctx.lineWidth = Math.max(3, sz * 0.14);
        ctx.strokeStyle = '#000';
        ctx.strokeText(e.text, e.x, yy);
      }
      ctx.fillStyle = e.color || '#FFD700';
      ctx.fillText(e.text, e.x, yy);
      ctx.restore();
    } else if (e.type === 'spawn') {
      ctx.fillStyle = e.color || '#4dff6e'; ctx.font = '11px monospace';
      ctx.fillText('▲', e.x, e.y);
    } else if (e.type === 'diagBeam') {
      const pct = e.timer / e.maxT;
      ctx.save();
      ctx.globalAlpha = Math.min(1, pct * 1.4);
      ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 22;
      ctx.strokeStyle = '#ffffee'; ctx.lineWidth = 10 * pct;
      ctx.beginPath(); ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); ctx.stroke();
      ctx.shadowBlur = 8;
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 4 * pct;
      ctx.beginPath(); ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); ctx.stroke();
      ctx.shadowBlur = 0; ctx.restore();
    } else if (e.type === 'divineParticle') {
      const pct = e.timer / e.maxT;
      ctx.save();
      ctx.globalAlpha = pct;
      const gr = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, 8*pct);
      gr.addColorStop(0, '#ffffff'); gr.addColorStop(0.4, '#ffee88'); gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(e.x, e.y, 8*pct, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    } else if (e.type === 'darkVortex') {
      const pct = e.timer / e.maxT;
      ctx.save();
      ctx.globalAlpha = pct * 0.7;
      const gr = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, 14 * pct);
      gr.addColorStop(0, '#aa00ff'); gr.addColorStop(0.5, '#550088'); gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(e.x, e.y, 14 * pct, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;

  if (gs.waveMsg && gs.waveMsg.timer > 0) {
    const a = Math.min(1, gs.waveMsg.timer / 500);
    ctx.globalAlpha = a;
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, CH/2-48, CW, 76);
    ctx.fillStyle = gs.waveMsg.color || '#FFD700';
    ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
    ctx.fillText(gs.waveMsg.text, CW/2, CH/2+12);
    ctx.globalAlpha = 1;
  }

  // 勇者登場テキスト（超巨大・中央・目立つ）
  if (gs.heroMsg && gs.heroMsg.timer > 0) {
    const t = gs.heroMsg.timer;
    const a = t > 2800 ? Math.min(1,(3500-t)/300) : t > 500 ? 1 : t/500;
    const shake = t > 3000 ? 0 : (Math.random()-0.5)*4;
    ctx.save();
    ctx.globalAlpha = Math.max(0, a);
    // 背景帯
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, CH/2-80, CW, 120);
    // 外縁グロー
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold 62px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('勇者が現れた！', CW/2 + shake, CH/2 + 20 + shake);
    ctx.shadowBlur = 0;
    // 白縁
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
    ctx.strokeText('勇者が現れた！', CW/2 + shake, CH/2 + 20 + shake);
    ctx.restore();
  }

  if (gs.waitingForEnter) {
    const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 300);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, CH/2-30, CW, 60);
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center';
    ctx.fillText(`WAVE ${gs.wave} クリア！  ─  Enter で次のWaveへ`, CW/2, CH/2+8);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function draw() {
  ctx.clearRect(0,0,CW,CH);
  drawBackground();
  drawPlayerCastle();
  drawEnemyCastle();
  for (const u of gs.units.filter(u=>u.side==='enemy')) drawUnit(u);
  if (gs.boss && gs.boss.state !== 'dead') drawUnit(gs.boss);
  // 味方を描画。勇者は兵士に隠れないよう最前面（最後）に描く
  const allies = gs.units.filter(u=>u.side==='ally');
  for (const u of allies.filter(u=>!u.isHero)) drawUnit(u);
  for (const u of allies.filter(u=>u.isHero)) drawUnit(u);
  drawEffects();
}

// ═══════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════
function gameLoop(ts) {
  if (gs.state !== 'playing' && gs.state !== 'waveclear') return;
  const dt = Math.min(ts - gs.lastFrame, 50);
  gs.lastFrame = ts;

  if (gs.state === 'playing') {
    gs.time += dt;
    gs.waveTime += dt;
    spawnEnemies(dt);
    updateUnits(dt);
    updateHeroLanding(dt);
    updateAllyDemonRising(dt);
    updateBossClash(dt);
    updateEffects(dt);
  } else {
    updateEffects(dt);
  }

  updateHUD();
  draw();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════
function loadRanking() {
  try { return JSON.parse(localStorage.getItem('soldiertypingRanking') || '[]'); } catch { return []; }
}
function saveRanking(entries) {
  try { localStorage.setItem('soldiertypingRanking', JSON.stringify(entries)); } catch {}
}
function addToRanking(name, score, wave) {
  const entries = loadRanking();
  entries.push({name, score, wave, date: new Date().toLocaleDateString('ja-JP')});
  entries.sort((a,b) => b.score - a.score);
  saveRanking(entries.slice(0, 20));
}
function buildRankingHTML(myScore) {
  const all = loadRanking().slice(0, 5);
  if (all.length === 0) return '<p style="color:#556;font-size:12px;margin:6px 0;">まだスコアなし（ランキングページで確認できます）</p>';
  let html = `<table style="width:100%;border-collapse:collapse;font-size:13px;margin:8px 0;">
<tr style="color:#aaa;border-bottom:1px solid #333;"><th style="text-align:left;padding:3px 6px;">#</th><th style="text-align:left;padding:3px 6px;">名前</th><th style="text-align:right;padding:3px 6px;">スコア</th><th style="text-align:right;padding:3px 6px;">Wave</th></tr>`;
  all.forEach((e, i) => {
    const isMe = e.score === myScore;
    const color = i===0 ? '#FFD700' : i===1 ? '#C0C0C0' : i===2 ? '#CD7F32' : isMe ? '#4dff6e' : '#ccc';
    const bg = isMe ? 'background:#1a3a1a;' : '';
    html += `<tr style="${bg}color:${color};">
<td style="padding:3px 6px;">${i+1}.</td>
<td style="padding:3px 6px;">${e.name}${isMe?' ◀ あなた':''}</td>
<td style="text-align:right;padding:3px 6px;">${e.score.toLocaleString()}</td>
<td style="text-align:right;padding:3px 6px;">Wave ${e.wave}</td></tr>`;
  });
  html += '</table>';
  return html;
}

function getPlayerName() {

function startGame(fromWave=1) {
  getAC();
  // 名前を保存
  const nameInput = document.getElementById('playerNameInput');
  if (nameInput) {
    const n = nameInput.value.trim();
    if (n) setPlayerName(n);
  }
  nextId = 0;
  gs = {
    state:'playing', time:0, waveTime:0, wave:fromWave, score:0,
    units:[], boss:null, bossSpawned:false,
    effects:[], spawnCount:0, spawnPower:1,
    goblinTimer:-3000, hobTimer:0,
    waveMsg:null, lastFrame:0,
    currentWord:null, inputValue:'', recentWords:[],
    enemyCastleHP: enemyCastleMaxHPForWave(fromWave),
    enemyCastleMaxHP: enemyCastleMaxHPForWave(fromWave),
    waitingForEnter: false, heroSpawned: false, allyDemonSpawned: false, heroMsg: null,
    combo: 0, missCount: 0,
  };
  updateComboDisp();
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('boss-bar-wrap').style.display = 'none';
  document.getElementById('boss-name').style.display = 'none';
  document.getElementById('boss-hp-txt').style.display = 'none';
  updateHUD();
  nextWord();
  document.getElementById('type-input').focus();
  // BGM: Wave1 専用曲、それ以外は通常曲から
  playBGM(fromWave === 1 ? 'wave1' : 'normal', { fadeMs: 1500 });
  requestAnimationFrame(ts => { gs.lastFrame = ts; requestAnimationFrame(gameLoop); });
}

function endGame(result) {
  gs.state = result;
  gs.combo = 0;
  updateComboDisp();
  stopBGM(1500);
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';

  const playerName = getPlayerName() || 'プレイヤー';

  if (result === 'win') {
    const total = gs.score + 10000;
    addToRanking(playerName, total, 5);
    if (window._submitScore) window._submitScore(playerName, total, 5);
    const tweetText = encodeURIComponent(`【ソルジャータイピング】全Wave制覇！スコア: ${total.toLocaleString()}点 ⚔️✨ #ソルジャータイピング #タイピングゲーム`);
    const tweetUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
    ov.innerHTML = `
<h1 style="color:#FFD700;font-size:28px;">🎉 VICTORY! 🎉</h1>
<p class="sub">神を倒し、世界に平和が戻った！</p>
<div id="result-score">${total.toLocaleString()} pt</div>
<p class="sub" style="color:#aaa">撃破: ${gs.score.toLocaleString()} ＋ 勝利ボーナス: 10,000</p>
<p class="sub">Wave: 5 クリア！ Time: ${Math.floor(gs.time/60000)}:${String(Math.floor(gs.time/1000)%60).padStart(2,'0')}　ミスタイプ: ${gs.missCount || 0} 回</p>
<div style="margin:6px 0 2px;font-size:12px;color:#FFD700;letter-spacing:1px;">― RANKING ―</div>
${buildRankingHTML(total)}
<a href="${tweetUrl}" target="_blank" rel="noopener"
  style="display:inline-block;margin:8px 4px 0;padding:10px 22px;background:#1DA1F2;color:#fff;font-size:14px;font-weight:bold;border-radius:8px;text-decoration:none;cursor:pointer;">
  𝕏 スコアを自慢する
</a>
<button class="big-btn" style="margin:8px 0 0;" onclick="startGame()">もう一度！</button>`;
  } else {
    const retryWave = gs.wave;
    addToRanking(playerName, gs.score, gs.wave);
    if (window._submitScore) window._submitScore(playerName, gs.score, gs.wave);
    const tweetText = encodeURIComponent(`【ソルジャータイピング】Wave${gs.wave}まで到達！スコア: ${gs.score.toLocaleString()}点 ⚔️ #ソルジャータイピング #タイピングゲーム`);
    const tweetUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
    ov.innerHTML = `
<h1 style="color:#ff4136">💀 GAME OVER 💀</h1>
<p class="sub">ボスが城に到達した…</p>
<div id="result-score">${gs.score.toLocaleString()} pt</div>
<p class="sub">到達Wave: ${gs.wave}　ミスタイプ: ${gs.missCount || 0} 回</p>
<div style="margin:6px 0 2px;font-size:12px;color:#FFD700;letter-spacing:1px;">― RANKING ―</div>
${buildRankingHTML(gs.score)}
<a href="${tweetUrl}" target="_blank" rel="noopener"
  style="display:inline-block;margin:8px 4px 0;padding:10px 22px;background:#1DA1F2;color:#fff;font-size:14px;font-weight:bold;border-radius:8px;text-decoration:none;cursor:pointer;">
  𝕏 スコアを自慢する
</a>
<button class="big-btn" style="margin:8px 4px 0;" onclick="startGame(${retryWave})">Wave ${retryWave} からリトライ</button>
<button class="big-btn" style="margin-top:6px;background:#888;font-size:13px;" onclick="startGame(1)">Wave 1 からやり直す</button>`;
  }
}

// ═══════════════════════════════════════════════
// TITLE DRAW
// ═══════════════════════════════════════════════
(function init() {
  ctx.fillStyle = '#06061e'; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle = '#2d5a1b'; ctx.fillRect(0,GROUND,CW,20);
  ctx.fillStyle = '#1a3a0e'; ctx.fillRect(0,GROUND+20,CW,CH-GROUND-20);
  // Title: draw pixel art now, replace with images after load
  drawSprite(ctx, SPRITE_SOLDIER, 80,  GROUND-54);
  drawSprite(ctx, SPRITE_ARCHER2, 130, GROUND-54);
  drawSprite(ctx, SPRITE_GOBLIN,  580, GROUND-42, true);
  drawSprite(ctx, SPRITE_HOBGOBLIN, 622, GROUND-54, true);
  drawSprite(ctx, SPRITE_DEMON,   680, GROUND-54, true);
  // Preload images in background
  preloadImages(null);
  // 保存済みの名前を入力欄に反映
  const savedName = getPlayerName();
  if (savedName) { const el = document.getElementById('playerNameInput'); if (el) el.value = savedName; }
  // 音声設定パネルを初期同期
  syncAudioPanel();
  // URLパラメータ ?wave=N で自動スタート（テスト用）
  const _waveParam = parseInt(new URLSearchParams(location.search).get('wave'));
  if (_waveParam >= 1 && _waveParam <= 5) {
    setTimeout(() => startGame(_waveParam), 300);
  }
})();
</script>
