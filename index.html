<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
:root{
  --panel:#161b21; --panel2:#1e252e; --line:#2c3742;
  --gold:#f3c34a; --txt:#d7e0e8; --sub:#8a99a8;
}
html,body{ height:100%; }
body{
  font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  background:#0c0f13; color:var(--txt); overflow:hidden;
  display:flex; flex-direction:column; height:100vh; height:100dvh;
}
.serif{ font-family:Georgia,"Times New Roman","Hiragino Mincho ProN","Yu Mincho",YuMincho,"Noto Serif JP",serif; }

/* ===== FIELD ===== */
#field{ position:relative; flex:1 1 auto; overflow:hidden; min-height:0; }
#bgImg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  object-position:bottom; z-index:0; pointer-events:none;
  filter:brightness(.75) saturate(.85); }

/* ===== BOSS ===== */
#boss{ position:absolute; left:50%; bottom:10%; transform:translateX(-50%);
  height:56%; z-index:5; pointer-events:none; transform-origin:bottom center; }
#boss img{ height:100%; width:auto; max-width:80vw; object-fit:contain; object-position:bottom;
  display:block; transform-origin:bottom center;
  filter:drop-shadow(0 10px 24px rgba(0,0,0,.65)); }
@keyframes bobFly{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-2.5%);} }
#boss img{ animation:bobFly 3.2s ease-in-out infinite; }
#boss.hit img{ animation:shake .13s; filter:brightness(1.9) saturate(1.5) drop-shadow(0 10px 24px rgba(0,0,0,.65)); }
@keyframes shake{ 0%{transform:translate(0,0);}25%{transform:translate(-6px,2px);}50%{transform:translate(5px,-1px);}75%{transform:translate(-3px,1px);}100%{transform:translate(0,0);} }
#boss.dead img{ animation:none; opacity:.28; filter:saturate(0) brightness(.5); transition:all .7s; }
#boss.dying img{ animation:die .7s forwards; }
@keyframes die{ to{ transform:translateY(6%) rotate(8deg) scale(.9); opacity:.28; filter:saturate(0) brightness(.5);} }

/* ===== BOSS PLATE (orb + name) ===== */
#bossPlate{ position:absolute; top:3.5%; left:50%; transform:translateX(-50%);
  z-index:8; text-align:center; pointer-events:none; }
#bossOrb{ position:relative; width:96px; height:96px; border-radius:50%; margin:0 auto;
  background:radial-gradient(circle at 36% 28%, #4a1414 0%, #220a0a 55%, #0a0303 100%);
  box-shadow:inset 0 -8px 16px rgba(0,0,0,.7), inset 0 4px 10px rgba(255,150,120,.15),
    0 0 0 2px #1c130c, 0 0 0 4px #8a6c30, 0 0 0 5px #cfab54, 0 0 0 6px #4a3718,
    0 6px 16px rgba(0,0,0,.7), 0 0 14px rgba(255,80,60,.25);
  overflow:hidden; }
#bossLiquid{ position:absolute; left:0; right:0; bottom:0; height:100%;
  background:linear-gradient(#ff6b54 0%, #e02a22 40%, #7c1212 100%);
  box-shadow:inset 0 8px 16px rgba(255,150,110,.5), inset 0 -6px 14px rgba(0,0,0,.4);
  transition:height .15s linear; }
#orbGloss{ position:absolute; top:7px; left:16px; width:40px; height:26px; border-radius:50%; z-index:4;
  background:radial-gradient(circle at 40% 40%, rgba(255,255,255,.75), rgba(255,255,255,.1) 60%, transparent 72%); }
#bossHpText{ position:absolute; inset:0; z-index:6; display:flex; flex-direction:column;
  align-items:center; justify-content:center; line-height:1.15; padding-top:12px;
  text-shadow:0 1px 3px #000,0 0 5px #000; color:#fff; }
#hptext{ font-size:13px; font-weight:700; white-space:nowrap; }
#hpsub{ font-size:8.5px; font-weight:600; color:#ffd9b0; margin-top:2px; white-space:nowrap; }
#bossNameFrame{ position:relative; z-index:7; display:inline-block; margin-top:-14px;
  max-width:min(86vw,420px); white-space:nowrap; padding:4px 24px;
  background:linear-gradient(rgba(24,16,9,.72),rgba(8,5,3,.76));
  border-top:1.5px solid rgba(200,150,70,.85); border-bottom:1.5px solid rgba(110,83,32,.85);
  box-shadow:0 2px 8px rgba(0,0,0,.55); }
#bossNameFrame::before,#bossNameFrame::after{ content:""; position:absolute; top:50%; width:8px; height:8px;
  transform:translateY(-50%) rotate(45deg); background:linear-gradient(135deg,#d9b35a,#7a5c24); }
#bossNameFrame::before{ left:-4px; } #bossNameFrame::after{ right:-4px; }
.bn-epi{ display:block; font-size:10px; font-weight:600; letter-spacing:.14em; color:#e6c674; text-shadow:0 1px 2px #000; }
.bn-main{ display:block; font-size:clamp(15px,2.6vw,19px); font-weight:800; letter-spacing:.04em;
  color:#f0e6d2; text-shadow:0 1px 3px #000; }

/* ===== HUD ===== */
.hudBox{ position:absolute; z-index:10; background:rgba(14,18,22,.82);
  border:1px solid var(--line); border-radius:10px; padding:8px 12px; font-size:12px;
  backdrop-filter:blur(3px); }
#hudL{ top:10px; left:10px; min-width:150px; }
#hudR{ top:10px; right:10px; text-align:right; }
.hudBox .row{ display:flex; justify-content:space-between; gap:14px; padding:1px 0; }
.hudBox .k{ color:var(--sub); } .hudBox .v{ font-weight:700; }
.vGold{ color:var(--gold); }

/* ===== combo / damage pops ===== */
#comboTag{ position:absolute; top:44%; left:16px; z-index:10; transform:translateY(-50%);
  font-weight:800; font-size:clamp(18px,3.4vw,32px); color:#ffd24a; text-shadow:0 2px 6px #000;
  opacity:0; transition:opacity .2s; }
#comboTag.on{ opacity:1; }
#comboTag small{ display:block; font-size:11px; color:var(--sub); font-weight:600; }
.dmg{ position:absolute; z-index:9; font-weight:800; pointer-events:none;
  text-shadow:0 1px 2px #000,0 0 4px rgba(0,0,0,.6); animation:flo .8s ease-out forwards; white-space:nowrap; }
@keyframes flo{ 0%{transform:translate(-50%,0) scale(.6); opacity:0;}
  20%{transform:translate(-50%,-14px) scale(1.1); opacity:1;}
  100%{transform:translate(-50%,-56px) scale(1); opacity:0;} }
.dmg.c{ color:#ffe14a; font-size:18px; }
.dmg.w{ color:#ff9a3d; font-size:24px; }
.clickfx{ position:absolute; z-index:8; pointer-events:none; width:90px; height:90px; }
.clickfx::before{ content:""; position:absolute; inset:0; border-radius:50%;
  border:4px solid transparent; border-top-color:#fff; border-right-color:#ffe96b;
  filter:drop-shadow(0 0 6px rgba(255,235,120,.9));
  animation:clkarc .22s ease-out forwards; }
@keyframes clkarc{ 0%{opacity:0;transform:rotate(calc(var(--ang) - 120deg)) scale(.5);}
  25%{opacity:1;} 100%{opacity:0;transform:rotate(calc(var(--ang) + 60deg)) scale(1.15);} }

/* ===== KILL BANNER ===== */
#killBanner{ position:absolute; top:24%; left:50%; transform:translateX(-50%); z-index:20;
  background:rgba(10,8,4,.85); border:1px solid #f3c34a; border-radius:10px;
  padding:10px 26px; text-align:center; pointer-events:none; opacity:0; transition:opacity .25s; }
#killBanner.on{ opacity:1; }
#killBanner .kb-title{ font-size:clamp(20px,4vw,30px); font-weight:900; color:#ffd24a; letter-spacing:.08em; }
#killBanner .kb-sub{ font-size:13px; color:var(--gold); margin-top:3px; }

/* ===== TIMER ===== */
#timerBig{ position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:11;
  font-size:15px; color:var(--sub); font-weight:700; letter-spacing:.1em;
  background:rgba(14,18,22,.75); border:1px solid var(--line); border-radius:8px; padding:3px 14px; display:none; }
#timerBig b{ font-size:22px; color:#fff; font-variant-numeric:tabular-nums; }
#timerBig.warn b{ color:#ff5a4a; }

/* ===== TYPE BAR ===== */
#typebar{ flex:0 0 auto; background:var(--panel); border-top:2px solid var(--line);
  padding:12px 16px 16px; display:flex; flex-direction:column; align-items:center; gap:5px;
  min-height:118px; }
#word-kana{ font-size:clamp(22px,4.4vw,32px); letter-spacing:.22em; color:var(--gold);
  text-shadow:0 0 12px rgba(243,195,74,.35); min-height:42px; font-weight:700; }
#word-roma{ font-size:clamp(14px,2.6vw,19px); letter-spacing:.16em; min-height:26px;
  font-family:"Courier New",monospace; }
#roma-done{ color:#4dff6e; } #roma-left{ color:#556270; }
#typebar .hint{ font-size:11px; color:var(--sub); }
#typebar.flash{ animation:tflash .18s; }
@keyframes tflash{ 0%{background:#3a1418;} 100%{background:var(--panel);} }

/* ===== OVERLAYS ===== */
.overlay{ position:absolute; inset:0; z-index:30; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:rgba(5,6,10,.9); text-align:center; padding:20px; }
.overlay h1{ font-size:clamp(26px,5vw,44px); letter-spacing:.12em; color:#f0e6d2; margin-bottom:6px; }
.overlay .sub{ font-size:13px; color:var(--sub); margin:4px 0; line-height:1.8; }
.gbtn{ margin-top:18px; padding:12px 44px; font-size:18px; font-weight:800; letter-spacing:.12em;
  background:linear-gradient(#ffd76a,#e0a92e); color:#1a1206; border:1px solid #8a6c30;
  border-radius:8px; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.5); }
.gbtn:hover{ filter:brightness(1.08); }
.gbtn:disabled{ filter:saturate(.3) brightness(.6); cursor:not-allowed; }
.gbtn2{ margin-top:10px; padding:8px 24px; font-size:13px; font-weight:700;
  background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:8px; cursor:pointer; }
.gbtn2:hover{ border-color:var(--gold); }
#nameIn{ margin-top:14px; padding:9px 14px; font-size:15px; width:230px; text-align:center;
  background:#0d1117; color:#fff; border:1px solid var(--line); border-radius:8px; outline:none; user-select:text; }
#nameIn:focus{ border-color:var(--gold); }
#countNum{ font-size:110px; font-weight:900; color:var(--gold); text-shadow:0 0 40px rgba(243,195,74,.5); }

/* result */
#resDmg{ font-size:clamp(34px,7vw,56px); font-weight:900; color:var(--gold); margin:6px 0;
  font-variant-numeric:tabular-nums; }
.resCleared{ font-size:20px; font-weight:800; color:#7fdc7f; letter-spacing:.1em; }
.resFailed{ font-size:16px; font-weight:700; color:var(--sub); }
#rankList{ margin-top:12px; font-size:13px; min-width:280px; max-width:380px; text-align:left; }
#rankList .rrow{ display:flex; justify-content:space-between; gap:12px; padding:3px 8px;

#rankList .rrow.me{ background:rgba(243,195,74,.12); border-radius:4px; }
#rankList .rname{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:190px; }
#rankList .rdmg{ color:var(--gold); font-weight:700; font-variant-numeric:tabular-nums; }
#rankTitle{ margin-top:16px; font-size:12px; color:var(--sub); letter-spacing:.15em; }

/* audio btn */
#audioBtn{ position:absolute; bottom:10px; right:12px; z-index:15; width:38px; height:38px;

  color:var(--gold); font-size:17px; cursor:pointer; line-height:1; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBhMkq24FzmHjnJu0OQ7SeQgEV__eY9iGo",
  authDomain: "bubble-wars-ffcd4.firebaseapp.com",
  projectId: "bubble-wars-ffcd4",
  storageBucket: "bubble-wars-ffcd4.firebasestorage.app",
  messagingSenderId: "465836224399",
  appId: "1:465836224399:web:8852c314794cfc69a025fa"
};
try {
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._submitRaid = async (rec) => {
    try {
      await addDoc(collection(db, 'scores'), { ...rec, ts: serverTimestamp() });
    } catch(e){ console.warn('submit failed', e); }
  };
  // 等価フィルタのみ（複合インデックス不要）。整列・uid重複除去はクライアント側。
  window._fetchRaidRanking = async (date) => {
    try {
      const snap = await getDocs(query(collection(db,'scores'),
        where('mode','==','raid1min'), where('date','==',date)));
      const best = new Map();
      snap.forEach(d => {
        const r = d.data();
        const cur = best.get(r.uid);
        if (!cur || (r.damage||0) > cur.damage) best.set(r.uid, {name:r.name||'？', damage:r.damage||0, cleared:!!r.cleared});
      });
      return [...best.entries()].map(([uid,v])=>({uid,...v})).sort((a,b)=>b.damage-a.damage);
    } catch(e){ console.warn('ranking failed', e); return null; }
  };
} catch(e){ console.warn('firebase init failed', e); }
</script>

// ═══════════════════════════════════════════════
// 単語プール（旧ソルジャータイピングの全Waveを統合・重複除去）
// ═══════════════════════════════════════════════
const WORDS_RAW = [
  'ねこ','いぬ','やま','かわ','そら','うみ','はな','つき','ほし','くも','かぜ','みず','ゆき','もり','あめ','いわ',

  'さくら','りんご','たいこ','かがみ','つるぎ','ゆうしゃ','ほのお','でんしゃ','おにぎり','かみなり','たいよう','こうえん',

  'あおぞら','たいけい','しろくま','ふるさと','にじいろ','ひるやすみ',
  'むてき','たたかい','さむらい','まもの','せいけん','はがね','くのいち','しにがみ','もうこう','せいれい','てきたい','げんかい',
  'えいゆう','かたな','ほうろう','いくさ','つわもの','けもの','のろい','やいば','きずな','まじない','ちから','たましい',

  'かみさま','てんし','せいや','えいこう','しんわ','きゅうてん','てんくう','おおぞら','げんそう','しんせい','えいえん',
  'むげん','りそう','てんのう','きせき','せいてん','みらい','あけぼの','れんげ','しんぴ','ほうこう','かいてん','とわ','たいら','むびょう',
];
const WORDS = [...new Set(WORDS_RAW)];

// ═══════════════════════════════════════════════
// 日替わり（JST基準・決定的）
// ═══════════════════════════════════════════════
function jstNow(){ return new Date(Date.now() + 9*3600e3); }
function jstDayIndex(){ return Math.floor((Date.now() + 9*3600e3) / 86400e3); }
function jstDateStr(){ return jstNow().toISOString().slice(0,10); }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

const TODAY      = jstDateStr();
const TODAY_BOSS = ROSTER[jstDayIndex() % ROSTER.length];

// 今日の出題順（全員同じ＝公平）。足りなければ繰り返し。
function todaysWordOrder(){
  const rng = mulberry32((jstDayIndex() * 2654435761) >>> 0);
  const arr = [...WORDS];
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(rng() * (i+1)); [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// ═══════════════════════════════════════════════
// プロフィール（localStorage）
// ═══════════════════════════════════════════════
function loadProfile(){
  let p = null;
  try { p = JSON.parse(localStorage.getItem('ts2_profile')); } catch(e){}
  if (!p || !p.uid) {
    p = { uid: 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2,10),
          name:'', totalClears:0, streak:0, lastClearDate:'', bestAll:0 };
  }
  return p;
}
function saveProfile(){ try { localStorage.setItem('ts2_profile', JSON.stringify(profile)); } catch(e){} }
function loadDaily(){
  try { const d = JSON.parse(localStorage.getItem('ts2_daily_' + TODAY)); if (d) return d; } catch(e){}
  return { best:0, tries:0, cleared:false };
}
function saveDaily(){ try { localStorage.setItem('ts2_daily_' + TODAY, JSON.stringify(daily)); } catch(e){} }

let profile = loadProfile();
let daily   = loadDaily();

// ═══════════════════════════════════════════════
// SE（WebAudio・依存ファイルなし）＋ 斬撃mp3
// ═══════════════════════════════════════════════
let audioOn = true;
let _ac = null;
function ac(){ if (!_ac) { try { _ac = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } return _ac; }
function blip(freq, dur=0.05, vol=0.12, type='square'){
  if (!audioOn) return; const c = ac(); if (!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
  o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime + dur);
}
const slashSe = new Audio('cthulhu-assets/slash.mp3'); slashSe.volume = 0.5;
function playSlash(){ if (!audioOn) return; try { slashSe.currentTime = 0; slashSe.play().catch(()=>{}); } catch(e){} }

// ═══════════════════════════════════════════════
// DOM
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
const bossEl = $('boss'), bossImg = $('bossImg');

// ═══════════════════════════════════════════════
// ゲーム状態
// ═══════════════════════════════════════════════
let state = 'title';   // title | countdown | playing | result | locked
let run = null;        // 進行中の1プレイ
let wordOrder = todaysWordOrder();

function newRun(){
  return {
    damage: 0, bossHp: BOSS_HP, killed: false,
    combo: 0, maxCombo: 0, typedChars: 0, missChars: 0, wordsDone: 0,
    wordIdx: 0, word: null, endAt: 0, timerId: null,
  };
}

function setBossVisual(){
  bossImg.src = 'cthulhu-assets/' + TODAY_BOSS.f;
  $('bossEpi').textContent  = TODAY_BOSS.epi;
  $('bossName').textContent = TODAY_BOSS.name;
}

function comboMult(c){ return 1 + COMBO_STEP * Math.min(c, COMBO_CAP); }

// ═══════════════════════════════════════════════
// HUD更新
// ═══════════════════════════════════════════════
function fmt(n){ return n.toLocaleString('ja-JP'); }
function updateHud(){
  $('hBest').textContent  = fmt(daily.best);
  $('hTries').textContent = daily.tries;
  $('hClears').textContent = profile.totalClears;
  $('hStreak').textContent = profile.streak + '日';
}
function updateOrb(){
  const hp = run ? Math.max(0, run.bossHp) : BOSS_HP;
  const pct = Math.round(hp / BOSS_HP * 100);
  $('bossLiquid').style.height = pct + '%';
  $('hptext').textContent = pct + '%';
  $('hpsub').textContent = run && run.killed ? 'オーバーキル中' : fmt(hp);
}
function updateCombo(){
  const el = $('comboTag');
  if (run && run.combo >= 5) {
    el.classList.add('on');
    $('comboN').textContent = run.combo + ' COMBO';
    $('comboM').textContent = '×' + comboMult(run.combo).toFixed(2);
  } else el.classList.remove('on');
}

// ═══════════════════════════════════════════════
// 演出
// ═══════════════════════════════════════════════
function bossRect(){ return bossEl.getBoundingClientRect(); }
function fieldRect(){ return $('field').getBoundingClientRect(); }
function popDamage(amount, big){
  const fr = fieldRect(), br = bossRect();
  const el = document.createElement('div');
  el.className = 'dmg ' + (big ? 'w' : 'c');
  el.textContent = fmt(amount);
  el.style.left = (br.left - fr.left + br.width * (0.3 + Math.random()*0.4)) + 'px';
  el.style.top  = (br.top - fr.top + br.height * (0.15 + Math.random()*0.35)) + 'px';
  $('field').appendChild(el);
  setTimeout(() => el.remove(), 850);
}
function slashFx(){
  const fr = fieldRect(), br = bossRect();
  const el = document.createElement('div');
  el.className = 'clickfx';
  el.style.setProperty('--ang', Math.floor(Math.random()*360) + 'deg');
  el.style.left = (br.left - fr.left + br.width*0.5 - 45 + (Math.random()-0.5)*60) + 'px';
  el.style.top  = (br.top - fr.top + br.height*0.35 - 45 + (Math.random()-0.5)*50) + 'px';
  $('field').appendChild(el);
  setTimeout(() => el.remove(), 260);
}
function bossHitFx(){
  bossEl.classList.remove('hit'); void bossEl.offsetWidth; bossEl.classList.add('hit');
}

// ═══════════════════════════════════════════════
// タイピング処理
// ═══════════════════════════════════════════════
function nextWord(){
  run.word = new TypingWord(wordOrder[run.wordIdx % wordOrder.length]);
  run.wordIdx++;
  renderWord();
}
function renderWord(){
  if (!run || !run.word) { $('word-kana').textContent = '－'; $('roma-done').textContent=''; $('roma-left').textContent=''; return; }
  $('word-kana').textContent = run.word.kana;
  $('roma-done').textContent = run.word.done;
  $('roma-left').textContent = run.word.left;
}

function applyDamage(amount, big){
  run.damage += amount;
  if (!run.killed) {
    run.bossHp -= amount;
    if (run.bossHp <= 0) { run.bossHp = 0; onKill(); }
  }
  updateOrb();
  popDamage(amount, big);
}

function onChar(ch){
  if (state !== 'playing' || !run.word) return;
  const r = run.word.press(ch);
  if (r.status === 'reject') {
    run.combo = 0; run.missChars++;
    updateCombo();
    $('typebar').classList.remove('flash'); void $('typebar').offsetWidth; $('typebar').classList.add('flash');
    blip(110, 0.08, 0.1, 'sawtooth');
    return;
  }
  // 正解1打
  run.typedChars++;
  run.combo++; run.maxCombo = Math.max(run.maxCombo, run.combo);
  const dmg = Math.round(DMG_BASE * comboMult(run.combo));
  applyDamage(dmg, false);
  bossHitFx(); slashFx();
  blip(300 + Math.min(run.combo, COMBO_CAP) * 10, 0.045, 0.09);
  updateCombo();
  if (r.status === 'complete') {
    run.wordsDone++;
    applyDamage(WORD_BONUS, true);
    playSlash();
    nextWord();
  } else {
    renderWord();
  }
}

function onKill(){
  run.killed = true;
  bossEl.classList.add('dying');
  setTimeout(() => { bossEl.classList.remove('dying'); bossEl.classList.add('dead'); }, 700);
  run.damage += KILL_BONUS;
  $('kbSub').textContent = '討伐ボーナス +' + fmt(KILL_BONUS) + ' ／ 残り時間はオーバーキル！';
  $('killBanner').classList.add('on');
  setTimeout(() => $('killBanner').classList.remove('on'), 2600);
  blip(880, 0.4, 0.15, 'triangle'); setTimeout(()=>blip(1320,0.5,0.12,'triangle'), 120);
}

// ═══════════════════════════════════════════════
// プレイの開始と終了
// ═══════════════════════════════════════════════
function startCountdown(){
  if (state === 'countdown' || state === 'playing') return;
  // 名前を保存
  const nm = $('nameIn').value.trim();
  profile.name = nm || profile.name || '名無しの探索者';
  saveProfile();
  showOverlay('ovCount');
  state = 'countdown';
  let n = 3;
  $('countNum').textContent = n;
  blip(440, 0.1);
  const iv = setInterval(() => {
    n--;
    if (n > 0) { $('countNum').textContent = n; blip(440, 0.1); return; }
    clearInterval(iv);
    $('countNum').textContent = 'GO!';
    blip(880, 0.25);
    setTimeout(beginRun, 350);
  }, 700);
}

function beginRun(){
  run = newRun();
  bossEl.classList.remove('dead','dying');
  setBossVisual();
  state = 'playing';
  showOverlay(null);
  $('timerBig').style.display = 'block';
  $('timerBig').classList.remove('warn');
  nextWord();
  updateOrb(); updateCombo();
  run.endAt = Date.now() + RUN_SECONDS * 1000;
  run.timerId = setInterval(tick, 100);
  tick();
}

function tick(){
  const left = Math.max(0, run.endAt - Date.now());
  const sec = Math.ceil(left / 1000);
  $('timeLeft').textContent = sec;
  if (sec <= 10) $('timerBig').classList.add('warn');
  if (left <= 0) endRun();
}

function endRun(){
  clearInterval(run.timerId);
  state = 'result';
  $('timerBig').style.display = 'none';
  $('comboTag').classList.remove('on');

  daily.tries++;
  const isBest = run.damage > daily.best;
  if (isBest) daily.best = run.damage;
  if (run.damage > (profile.bestAll||0)) profile.bestAll = run.damage;

  let newClear = false;
  if (run.killed && !daily.cleared) {
    daily.cleared = true; newClear = true;
    // ストリーク：昨日もクリアしてたら+1、切れてたら1から
    const y = new Date(jstNow().getTime() - 86400e3).toISOString().slice(0,10);
    profile.streak = (profile.lastClearDate === y) ? profile.streak + 1 : 1;
    profile.totalClears++;
    profile.lastClearDate = TODAY;
  }
  saveDaily(); saveProfile(); updateHud();

  // 結果画面
  $('resState').className = run.killed ? 'resCleared' : 'resFailed';
  $('resState').textContent = run.killed ? '討 伐 成 功 ！' : '討伐ならず……あと ' + fmt(run.bossHp) + ' 削れば倒せた';
  $('resDmg').textContent = fmt(run.damage);
  $('resDetail').innerHTML =
    (isBest ? '<b style="color:var(--gold)">今日のベスト更新！</b>　' : '') +
    '正確' + run.typedChars + '打 ／ ミス' + run.missChars + ' ／ 最大' + run.maxCombo + 'コンボ ／ ' + run.wordsDone + '語';
  $('btnRetry').textContent = daily.cleared ? '討伐済み！また明日' : 'もう一回（Enter）';
  $('btnRetry').disabled = daily.cleared && !DEBUG;
  showOverlay('ovResult');

  // 送信＆ランキング（失敗してもゲームは成立）
  if (window._submitRaid) {
    window._submitRaid({ uid: profile.uid, name: profile.name, mode:'raid1min',
      boss: TODAY_BOSS.id, date: TODAY, damage: run.damage, cleared: run.killed });
  }
  refreshRanking('rankList');
}

async function refreshRanking(listId){
  const el = $(listId);
  el.innerHTML = '<div class="sub">読み込み中…</div>';
  if (!window._fetchRaidRanking) { el.innerHTML = '<div class="sub">オフライン</div>'; return; }
  const rows = await window._fetchRaidRanking(TODAY);
  if (!rows) { el.innerHTML = '<div class="sub">ランキング取得に失敗</div>'; return; }
  if (!rows.length) { el.innerHTML = '<div class="sub">まだ記録なし。一番乗り！</div>'; return; }
  el.innerHTML = rows.slice(0, 10).map((r, i) =>
    '<div class="rrow' + (r.uid === profile.uid ? ' me' : '') + '">' +
    '<span>' + (i+1) + '位 <span class="rname">' + escapeHtml(r.name) + (r.cleared ? ' ⚔' : '') + '</span></span>' +
    '<span class="rdmg">' + fmt(r.damage) + '</span></div>'
  ).join('');
  const myIdx = rows.findIndex(r => r.uid === profile.uid);
  if (myIdx >= 10) {
    const r = rows[myIdx];
    el.innerHTML += '<div class="rrow me"><span>' + (myIdx+1) + '位 <span class="rname">' +
      escapeHtml(r.name) + '</span></span><span class="rdmg">' + fmt(r.damage) + '</span></div>';
  }
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ═══════════════════════════════════════════════
// オーバーレイ制御
// ═══════════════════════════════════════════════
function showOverlay(id){
  for (const o of ['ovTitle','ovCount','ovResult','ovLocked'])
    $(o).style.display = (o === id) ? 'flex' : 'none';
}

function showLocked(){
  state = 'locked';
  setBossVisual();
  bossEl.classList.add('dead');
  updateOrb();
  $('bossLiquid').style.height = '0%'; $('hptext').textContent = '0%'; $('hpsub').textContent = '討伐済み';
  $('lockBossName').textContent = TODAY_BOSS.epi + '「' + TODAY_BOSS.name + '」';
  $('lockStats').innerHTML = '今日のベスト <b style="color:var(--gold)">' + fmt(daily.best) + '</b>' +
    '　通算討伐 <b>' + profile.totalClears + '</b>体　連続 <b>' + profile.streak + '</b>日';
  showOverlay('ovLocked');
  refreshRanking('rankList2');
}

// ═══════════════════════════════════════════════
// 入力（typing-engine の IME回避キー取得）
// ═══════════════════════════════════════════════
attachKeyInput({
  isActive: () => state === 'playing',
  onChar,
  onEnter: () => {
    if (document.activeElement === $('nameIn')) { $('nameIn').blur(); startCountdown(); return; }
    if (state === 'title') startCountdown();
    else if (state === 'result' && !$('btnRetry').disabled) startCountdown();
  },
});

$('btnStart').addEventListener('click', startCountdown);
$('btnRetry').addEventListener('click', () => { if (!$('btnRetry').disabled) startCountdown(); });
$('audioBtn').addEventListener('click', () => {
  audioOn = !audioOn;
  $('audioBtn').style.color = audioOn ? 'var(--gold)' : '#555';
  $('audioBtn').textContent = audioOn ? '♪' : '✕';
});

// ═══════════════════════════════════════════════
// 起動
// ═══════════════════════════════════════════════
(function init(){
  setBossVisual();
  updateHud(); updateOrb();
  $('nameIn').value = profile.name || '';
  $('ovTodayBoss').textContent = '本日の神格：' + TODAY_BOSS.epi + '「' + TODAY_BOSS.name + '」';
  if (daily.cleared && !DEBUG) showLocked();
  else showOverlay('ovTitle');
})();
</script>
